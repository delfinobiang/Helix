<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <script src="analytics.js" defer></script>
  <link rel="canonical" href="https://learnhelix.org/lesson-sql.html" />
  <title>Helix — SQL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #050816;
      --bg-2:     #0C1022;
      --bg-card:  rgba(255,255,255,0.04);
      --border:   rgba(255,255,255,0.07);
      --border-hi: rgba(99,102,241,0.3);
      --primary:  #6366F1;
      --primary-l: #818CF8;
      --cyan:     #22D3EE;
      --accent:   #F59E0B;
      --text:     #EEF2F8;
      --text-2:   #8892A4;
      --text-3:   #2D3A4E;
      --green:    #10B981;
      --yellow:   #F59E0B;
      --red:      #EF4444;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; line-height: 1.6;
      overflow: hidden; display: flex; flex-direction: column;
    }
    .aurora {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; overflow: hidden;
      filter: blur(100px) saturate(120%);
    }
    .orb { position: absolute; border-radius: 50%; animation-direction: alternate; animation-iteration-count: infinite; }
    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(99,102,241,0.35) 0%, transparent 65%); top: -100px; left: -100px; animation: drift1 25s ease-in-out infinite alternate; }
    .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(139,92,246,0.25) 0%, transparent 65%); bottom: -100px; right: -100px; animation: drift2 20s ease-in-out infinite alternate; }
    @keyframes drift1 { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(60px,80px) scale(1.1); } }
    @keyframes drift2 { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(-60px,-60px) scale(1.08); } }
    @media (prefers-reduced-motion: reduce) { .orb { animation: none; } }

    /* ─── NAVBAR ──────────────────────────────────────────── */
    nav {
      height: 56px; padding: 0 1.5rem; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(5,8,22,0.85);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }
    .nav-left  { display: flex; align-items: center; gap: 1rem; }
    .nav-right { display: flex; align-items: center; gap: 0.75rem; }
    .btn-back {
      display: flex; align-items: center; gap: 0.4rem;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: var(--text-2); font-size: 0.8rem; font-weight: 600;
      padding: 0.38rem 0.9rem; border-radius: 8px; cursor: pointer;
      font-family: inherit; text-decoration: none;
      transition: background 0.18s, color 0.18s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.07); color: var(--text); }
    .lesson-breadcrumb { font-size: 0.82rem; color: var(--text-3); }
    .lesson-breadcrumb strong { color: var(--text-2); font-weight: 600; }
    .xp-badge {
      display: flex; align-items: center; gap: 0.35rem;
      background: rgba(255,179,71,0.08); border: 1px solid rgba(255,179,71,0.18);
      color: var(--yellow); font-size: 0.78rem; font-weight: 700;
      padding: 0.28rem 0.7rem; border-radius: 100px;
    }
    .btn-primary {
      background: var(--primary);
      border: 1px solid rgba(255,255,255,0.1); color: white;
      font-family: inherit; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; padding: 0.45rem 1.2rem; border-radius: 9px;
      box-shadow: 0 4px 16px rgba(99,102,241,0.28);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(99,102,241,0.38); }
    .btn-primary:disabled { opacity: 0.45; pointer-events: none; }

    /* ─── PROGRESS ────────────────────────────────────────── */
    .lesson-progress { height: 3px; background: rgba(255,255,255,0.05); flex-shrink: 0; }
    .lesson-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transition: width 0.6s ease;
    }

    /* ─── SPLIT ───────────────────────────────────────────── */
    .split {
      flex: 1; display: grid; grid-template-columns: 1fr 1fr;
      overflow: hidden; min-height: 0; position: relative; z-index: 1;
    }

    /* ─── LEFT PANEL ──────────────────────────────────────── */
    .panel-left {
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .panel-left-inner {
      flex: 1; overflow-y: auto; padding: 2rem 2rem 1rem;
    }
    .panel-left-inner::-webkit-scrollbar { width: 4px; }
    .panel-left-inner::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

    .lesson-num-tag {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--primary); margin-bottom: 0.5rem;
    }
    .lesson-title-h {
      font-size: 1.55rem; font-weight: 800; letter-spacing: -0.025em;
      line-height: 1.2; margin-bottom: 1.4rem;
    }
    .lesson-body { font-size: 0.9rem; color: var(--text-2); line-height: 1.82; }
    .lesson-body p  { margin-bottom: 1rem; }
    .lesson-body h3 { font-size: 0.95rem; font-weight: 700; color: var(--text); margin: 1.4rem 0 0.6rem; }
    .lesson-body ul { padding-left: 1.2rem; margin-bottom: 1rem; }
    .lesson-body ul li { margin-bottom: 0.3rem; }
    .lesson-body code {
      font-family: 'JetBrains Mono', monospace; font-size: 0.82em;
      background: rgba(99,102,241,0.1); color: #C4B5FD;
      padding: 0.12em 0.38em; border-radius: 5px;
      border: 1px solid rgba(99,102,241,0.18);
    }
    .lesson-body .code-block {
      background: #05091A; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px; padding: 1rem 1.2rem; margin: 1rem 0;
      font-family: 'JetBrains Mono', monospace; font-size: 0.82rem;
      line-height: 1.9; overflow-x: auto; white-space: pre-wrap;
    }
    .kw  { color: #C792EA; } .fn  { color: #82AAFF; } .st  { color: #C3E88D; }
    .cm  { color: #3D4F5C; font-style: italic; } .vr  { color: #F78C6C; } .nm  { color: #F78C6C; }

    .objective-box {
      margin: 1.5rem 0 0;
      background: rgba(99,102,241,0.06); border: 1px solid rgba(99,102,241,0.18);
      border-radius: 14px; padding: 1.2rem 1.3rem;
    }
    .objective-label {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--primary); margin-bottom: 0.6rem;
    }
    .objective-text { font-size: 0.9rem; color: var(--text); font-weight: 600; line-height: 1.55; }

    .bonus-box {
      margin: 1.5rem 0 0;
      background: rgba(16,185,129,0.06); border: 1px solid rgba(16,185,129,0.22);
      border-radius: 14px; padding: 1.2rem 1.3rem;
    }
    .bonus-label {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--green); margin-bottom: 0.3rem;
    }
    .bonus-title { font-size: 0.9rem; color: var(--text); font-weight: 700; margin-bottom: 0.4rem; }
    .bonus-text  { font-size: 0.85rem; color: var(--text-2); line-height: 1.55; margin-bottom: 0.9rem; }
    .btn-bonus-submit {
      background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3);
      color: var(--green); font-family: inherit; font-size: 0.82rem; font-weight: 700;
      cursor: pointer; padding: 0.42rem 1.1rem; border-radius: 8px;
      transition: background 0.15s, transform 0.15s;
    }
    .btn-bonus-submit:hover { background: rgba(16,185,129,0.2); transform: translateY(-1px); }
    .btn-bonus-submit:disabled { opacity: 0.4; pointer-events: none; }
    .bonus-feedback { font-size: 0.82rem; margin-top: 0.6rem; min-height: 1.2em; font-weight: 600; }

    /* Hint / solution */
    .extras { padding: 0 2rem 1.5rem; display: flex; flex-direction: column; gap: 0.6rem; }
    .collapsible { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
    .collapsible-header {
      width: 100%; display: flex; align-items: center; gap: 0.6rem;
      padding: 0.75rem 1rem; background: var(--bg-card);
      border: none; cursor: pointer; font-family: inherit;
      font-size: 0.85rem; font-weight: 600; color: var(--text-2);
      text-align: left; transition: background 0.18s, color 0.18s;
    }
    .collapsible-header:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .collapsible-header .chevron { margin-left: auto; font-size: 0.7rem; transition: transform 0.25s; }
    .collapsible-header.open .chevron { transform: rotate(180deg); }
    .collapsible-hint     { border-color: rgba(255,179,71,0.2); }
    .collapsible-hint .collapsible-header   { color: rgba(255,179,71,0.8); }
    .collapsible-solution { border-color: rgba(74,222,128,0.18); }
    .collapsible-solution .collapsible-header { color: rgba(74,222,128,0.8); }

    /* Locked solution state */
    .collapsible-solution.locked {
      border-color: var(--border);
      opacity: 0.5;
    }
    .collapsible-solution.locked .collapsible-header {
      color: var(--text-3);
      cursor: not-allowed;
    }
    .collapsible-solution.locked .collapsible-header:hover {
      background: var(--bg-card);
      color: var(--text-3);
    }
    .sol-lock-msg {
      font-size: 0.72rem; color: var(--text-3);
      margin-left: auto; margin-right: 0.4rem;
      font-style: italic; white-space: nowrap;
    }
    .collapsible-solution:not(.locked) .sol-lock-msg { display: none; }
    .collapsible-body {
      display: none; padding: 1rem;
      font-size: 0.85rem; line-height: 1.72; color: var(--text-2);
      background: rgba(0,0,0,0.15); border-top: 1px solid var(--border);
    }
    .collapsible-body.open { display: block; }
    .collapsible-body code {
      font-family: 'JetBrains Mono', monospace; font-size: 0.82em;
      background: rgba(99,102,241,0.08); color: #C4B5FD;
      padding: 0.1em 0.35em; border-radius: 5px;
    }
    .collapsible-body .code-block {
      background: #05091A; border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; padding: 0.9rem 1.1rem; margin-top: 0.75rem;
      font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; line-height: 1.9;
      overflow-x: auto; white-space: pre-wrap;
    }

    /* ─── RIGHT PANEL ─────────────────────────────────────── */
    .panel-right { display: flex; flex-direction: column; overflow: hidden; }
    .editor-toolbar {
      padding: 0.65rem 1.2rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.6rem;
      background: rgba(6,10,20,0.6); flex-shrink: 0;
    }
    .win-dots { display: flex; gap: 5px; }
    .wd { width: 10px; height: 10px; border-radius: 50%; }
    .wd.r { background: #FF5F57; } .wd.y { background: #FFBD2E; } .wd.g { background: #28C840; }
    .editor-fname { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-3); margin-left: 0.4rem; flex: 1; }
    .btn-run {
      display: flex; align-items: center; gap: 0.45rem;
      background: linear-gradient(135deg, #22C55E, #16A34A);
      border: none; color: white; font-family: inherit;
      font-size: 0.82rem; font-weight: 700;
      cursor: pointer; padding: 0.42rem 1.1rem; border-radius: 8px;
      box-shadow: 0 3px 14px rgba(74,222,128,0.22);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-run:hover { transform: translateY(-1px); box-shadow: 0 5px 20px rgba(74,222,128,0.32); }
    .btn-run:disabled { opacity: 0.4; pointer-events: none; }
    .btn-clear {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: var(--text-3); font-family: inherit; font-size: 0.78rem;
      cursor: pointer; padding: 0.42rem 0.85rem; border-radius: 8px;
      transition: background 0.15s, color 0.15s;
    }
    .btn-clear:hover { background: rgba(255,255,255,0.07); color: var(--text-2); }

    .editor-wrap { flex: 1; display: flex; overflow: hidden; position: relative; min-height: 0; }
    .line-nums {
      padding: 1.1rem 0.75rem 1.1rem 1rem;
      font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; line-height: 1.9;
      color: var(--text-3); text-align: right; user-select: none;
      background: rgba(0,0,0,0.15); border-right: 1px solid rgba(255,255,255,0.04);
      min-width: 44px; overflow: hidden; flex-shrink: 0;
    }
    .editor-code-area {
      flex: 1; position: relative; overflow: hidden; min-height: 0;
      background: #050C1A;
    }
    .hl-pre {
      position: absolute; inset: 0; z-index: 0; pointer-events: none;
      font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; line-height: 1.9;
      padding: 1.1rem 1.2rem; tab-size: 4; white-space: pre-wrap;
      word-break: break-all; overflow: hidden; margin: 0;
      color: transparent; background: transparent;
    }
    .editor-textarea {
      position: absolute; inset: 0; z-index: 1;
      resize: none; border: none; outline: none;
      background: transparent; color: transparent;
      font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; line-height: 1.9;
      padding: 1.1rem 1.2rem; tab-size: 4;
      caret-color: var(--primary);
      overflow-y: auto; overflow-x: auto;
    }
    .editor-textarea::selection { background: rgba(99,102,241,0.3); }
    .editor-textarea::-webkit-scrollbar { width: 4px; height: 4px; }
    .editor-textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

    /* Output */
    .output-panel {
      border-top: 1px solid var(--border); flex-shrink: 0;
      display: flex; flex-direction: column; max-height: 38%;
    }
    .output-header {
      padding: 0.55rem 1.2rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.5rem;
      background: rgba(0,0,0,0.2); flex-shrink: 0;
    }
    .output-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-3); flex: 1; }
    .output-status { font-size: 0.68rem; font-weight: 700; padding: 0.14rem 0.55rem; border-radius: 6px; }
    .os-running { background: rgba(255,179,71,0.1);  color: var(--yellow); }
    .os-ok      { background: rgba(74,222,128,0.1);  color: var(--green);  }
    .os-error   { background: rgba(255,107,107,0.1); color: var(--red);    }
    .os-idle    { background: rgba(255,255,255,0.04); color: var(--text-3); }
    .output-body {
      flex: 1; overflow-y: auto; padding: 0.9rem 1.2rem;
      font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; line-height: 1.85;
      background: #040810;
    }
    .output-body::-webkit-scrollbar { width: 4px; }
    .output-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 4px; }
    .out-line        { color: var(--green); white-space: pre-wrap; word-break: break-word; display: block; }
    .out-error       { color: var(--red);   white-space: pre-wrap; word-break: break-word; display: block; }
    .out-placeholder { color: var(--text-3); font-style: italic; }

    /* SQL / engine loader */
    .py-loader {
      position: absolute; inset: 0; background: rgba(6,10,20,0.88);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.75rem; z-index: 5; backdrop-filter: blur(6px);
    }
    .py-loader.hidden { display: none; }
    .spinner {
      width: 28px; height: 28px; border-radius: 50%;
      border: 3px solid rgba(99,102,241,0.2); border-top-color: var(--primary);
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .py-loader-text { font-size: 0.82rem; color: var(--text-3); }

    /* ─── COMPLETION MODAL ────────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px); z-index: 200;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.28s;
    }
    .modal-backdrop.show { opacity: 1; pointer-events: all; }
    .modal {
      background: #05091A; border: 1px solid rgba(99,102,241,0.28);
      border-radius: 26px; padding: 2.5rem 2.5rem 2rem;
      max-width: 420px; width: 90%; text-align: center;
      transform: translateY(24px) scale(0.95);
      transition: transform 0.32s cubic-bezier(0.34,1.55,0.64,1);
      box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 60px rgba(99,102,241,0.10);
      position: relative; overflow: hidden;
    }
    .modal-backdrop.show .modal { transform: translateY(0) scale(1); }

    /* Pip in modal */
    .modal-pip-wrap { margin-bottom: 1rem; animation: pip-bounce 0.7s ease; }
    @keyframes pip-bounce {
      0%   { transform: translateY(-30px) scale(0.7); opacity: 0; }
      60%  { transform: translateY(5px) scale(1.05); opacity: 1; }
      100% { transform: translateY(0) scale(1); }
    }
    .modal-title { font-size: 1.45rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.4rem; }
    .modal-sub   { font-size: 0.88rem; color: var(--text-2); margin-bottom: 1.5rem; line-height: 1.6; }
    .modal-xp-wrap {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: rgba(255,179,71,0.1); border: 1px solid rgba(255,179,71,0.22);
      color: var(--yellow); font-size: 1.15rem; font-weight: 800;
      padding: 0.55rem 1.6rem; border-radius: 100px; margin-bottom: 1.6rem;
    }
    .modal-xp-count { transition: all 0.1s; }
    .modal-actions { display: flex; gap: 0.75rem; justify-content: center; }
    .btn-modal-next {
      background: var(--primary);
      border: 1px solid rgba(255,255,255,0.1); color: white;
      font-family: inherit; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; padding: 0.7rem 1.8rem; border-radius: 12px;
      box-shadow: 0 4px 20px rgba(99,102,241,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-modal-next:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(99,102,241,0.4); }
    .btn-modal-dash {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: var(--text-2); font-family: inherit; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; padding: 0.7rem 1.4rem; border-radius: 12px;
      transition: background 0.15s, color 0.15s;
    }
    .btn-modal-dash:hover { background: rgba(255,255,255,0.07); color: var(--text); }

    /* ─── CONFETTI CANVAS ─────────────────────────────────── */
    #confetti-canvas {
      position: fixed; inset: 0; pointer-events: none; z-index: 199;
      opacity: 0; transition: opacity 0.3s;
    }
    #confetti-canvas.active { opacity: 1; }

    /* ─── MOBILE ──────────────────────────────────────────── */
    @media (max-width: 768px) {
      body { overflow: auto; }
      .split { grid-template-columns: 1fr; overflow: visible; height: auto; flex: none; }
      .panel-left  { border-right: none; border-bottom: 1px solid var(--border); max-height: none; overflow: visible; }
      .panel-left-inner { overflow: visible; }
      .panel-right { min-height: 520px; flex: none; height: 520px; }
      .lesson-breadcrumb { display: none; }
      .output-panel { max-height: 180px; }
    }
  </style>
</head>
<body>
<div class="aurora" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>

<!-- ─── NAVBAR ──────────────────────────────────────────── -->
<nav>
  <div class="nav-left">
    <a class="btn-back" href="dashboard.html">← Back</a>
    <div class="lesson-breadcrumb">SQL Fundamentals &nbsp;/&nbsp; <strong id="nav-lesson-title">Lesson</strong></div>
  </div>
  <div class="nav-right">
    <div class="xp-badge">⚡ <span id="nav-xp">0</span> XP</div>
    <button class="btn-primary" id="btn-submit" disabled>Submit →</button>
  </div>
</nav>

<div class="lesson-progress">
  <div class="lesson-progress-fill" id="progress-fill" style="width:0%"></div>
</div>

<!-- ─── SPLIT ────────────────────────────────────────────── -->
<div class="split">

  <div class="panel-left">
    <div class="panel-left-inner" id="lesson-content"></div>
    <div class="extras">
      <div class="collapsible collapsible-hint">
        <button class="collapsible-header" id="hint-toggle">
          💡 Show Hint <span class="chevron">▼</span>
        </button>
        <div class="collapsible-body" id="hint-body"></div>
      </div>
      <div class="collapsible collapsible-solution locked" id="solution-collapsible">
        <button class="collapsible-header" id="solution-toggle">
          🔒 Show Solution
          <span class="sol-lock-msg">run your code first</span>
          <span class="chevron">▼</span>
        </button>
        <div class="collapsible-body" id="solution-body"></div>
      </div>
      <div class="bonus-box" id="bonus-box" style="display:none">
        <div class="bonus-label">⭐ Bonus Challenge</div>

<script>
// ═══════════════════════════════════════════════════════════
// LESSON DATA — 15 SQL Fundamentals lessons
// ═══════════════════════════════════════════════════════════
const LESSONS = {

  1: {
    title: "SELECT All", xp: 50, fname: "select_all.sql",
    setup: `CREATE TABLE users (id INTEGER, name TEXT, age INTEGER);
INSERT INTO users VALUES (1,'Alice',30),(2,'Bob',25),(3,'Carol',35);`,
    content: `
      <div class="lesson-num-tag">Lesson 1 · SQL Fundamentals</div>
      <h1 class="lesson-title-h">SELECT All 🗄️</h1>
      <div class="lesson-body">
        <p>SQL (<strong>Structured Query Language</strong>) is the language for talking to databases. Every query starts with <code>SELECT</code>, which retrieves data.</p>
        <p>To fetch <em>every</em> column from a table, use <code>*</code> (the wildcard):</p>
        <div class="code-block"><span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="vr">users</span>;</div>
        <p>This reads: "select all columns from the users table." The semicolon ends the statement.</p>
        <h3>The users table</h3>
        <p>For this lesson a table has already been created with three columns — <code>id</code>, <code>name</code>, and <code>age</code> — and three rows of data.</p>
        <h3>Why SQL?</h3>
        <p>Databases power almost every application you use — from social media feeds to e-commerce carts. SQL lets you ask precise questions: "show me all users older than 25" or "find the top-selling product last week." It's one of the most universally useful skills a developer can have.</p>
        <h3>Statement structure</h3>
        <p>Every SQL statement follows a predictable pattern. The most basic form is <code>SELECT columns FROM table</code>. SQL is case-insensitive, but writing keywords in uppercase (<code>SELECT</code>, <code>FROM</code>) is a widely followed convention that makes queries easier to scan.</p>
        <div class="objective-box">
          <div class="objective-label">🎯 Objective</div>
          <div class="objective-text">Write a query that selects <strong>all rows and all columns</strong> from the <code>users</code> table.</div>
        </div>
      </div>`,
    hint: `<p>Use the wildcard <code>*</code> to select every column:</p>
      <div class="code-block"><span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="vr">table_name</span>;</div>`,
    solution: `<div class="code-block"><span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="vr">users</span>;</div>`,
    starter: `-- Select all rows from the users table\n`,
    check: (out, code, lines) => {
      const flat = lines.map(l => l.vals ? l.vals.join(' ') : (l.cols ? l.cols.join(' ') : '')).join(' ');
      return flat.includes('Alice') && flat.includes('Bob');
    },
    bonus: {
      title: "Count the rows",
      desc: "Use SELECT COUNT(*) FROM users to find out how many rows the table has. Your output should contain the number 3.",
      xp: 25,
      check: (out, code, lines) => {
        const flat = lines.filter(l => l.type === 'row').map(l => l.vals.join(' ')).join(' ');
        return /COUNT/i.test(code) && flat.includes('3');
      },
    },
  },

  2: {
    title: "SELECT Columns", xp: 75, fname: "select_columns.sql",
    setup: `CREATE TABLE users (id INTEGER, name TEXT, age INTEGER);
INSERT INTO users VALUES (1,'Alice',30),(2,'Bob',25),(3,'Carol',35);`,
    content: `
      <div class="lesson-num-tag">Lesson 2 · SQL Fundamentals</div>
      <h1 class="lesson-title-h">SELECT Columns 🎯</h1>
      <div class="lesson-body">
        <p>Instead of fetching every column with <code>*</code>, you can name specific columns separated by commas. This is more efficient and makes your intentions clear.</p>
        <div class="code-block"><span class="kw">SELECT</span> <span class="vr">name</span>, <span class="vr">age</span> <span class="kw">FROM</span> <span class="vr">users</span>;</div>
        <p>Only the listed columns appear in the result — <code>id</code> is excluded here.</p>
        <h3>Column order</h3>
        <p>You control the order columns appear in the output by changing the order in your SELECT list:</p>
        <div class="code-block"><span class="kw">SELECT</span> <span class="vr">age</span>, <span class="vr">name</span> <span class="kw">FROM</span> <span class="vr">users</span>; <span class="cm">-- age column first</span></div>
        <h3>Column aliases</h3>
        <p>You can rename a column in the output with <code>AS</code>:</p>
        <div class="code-block"><span class="kw">SELECT</span> <span class="vr">name</span> <span class="kw">AS</span> <span class="vr">full_name</span>, <span class="vr">age</span> <span class="kw">AS</span> <span class="vr">years</span> <span class="kw">FROM</span> <span class="vr">users</span>;</div>
        <p>Aliases make output more readable, especially when working with calculated columns or joining tables where names would clash.</p>
        <div class="objective-box">
          <div class="objective-label">🎯 Objective</div>
          <div class="objective-text">Select only the <code>name</code> and <code>age</code> columns from the <code>users</code> table (do <strong>not</strong> use <code>SELECT *</code>).</div>
        </div>
      </div>`,
    hint: `<p>List the column names after SELECT, separated by a comma:</p>
      <div class="code-block"><span class="kw">SELECT</span> <span class="vr">col1</span>, <span class="vr">col2</span> <span class="kw">FROM</span> <span class="vr">table_name</span>;</div>`,
    solution: `<div class="code-block"><span class="kw">SELECT</span> <span class="vr">name</span>, <span class="vr">age</span> <span class="kw">FROM</span> <span class="vr">users</span>;</div>`,
    starter: `-- Select only name and age (not id)\n`,
    check: (out, code, lines) => {
      const flat = lines.map(l => l.vals ? l.vals.join(' ') : (l.cols ? l.cols.join(' ') : '')).join(' ');
      return flat.includes('Alice') && /name/i.test(code) && !/SELECT\s+\*/i.test(code);
    },
    bonus: {
      title: "Alias both columns",
      desc: "Select name AS full_name and age AS years from users. Both aliased column names must appear in the header row.",
      xp: 30,
      check: (out, code, lines) => {
        const header = lines.find(l => l.type === 'header');
        if (!header) return false;
        const cols = header.cols.join(' ').toLowerCase();
        return cols.includes('full_name') && cols.includes('years');
      },
    },
  },

  3: {
    title: "WHERE Clause", xp: 75, fname: "where.sql",
    setup: `CREATE TABLE users (id INTEGER, name TEXT, age INTEGER);
INSERT INTO users VALUES (1,'Alice',30),(2,'Bob',25),(3,'Carol',35);`,
    content: `
      <div class="lesson-num-tag">Lesson 3 · SQL Fundamentals</div>
      <h1 class="lesson-title-h">WHERE Clause 🔍</h1>
      <div class="lesson-body">
        <p>The <code>WHERE</code> clause filters rows. Only rows matching the condition are returned.</p>
        <div class="code-block"><span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="vr">users</span> <span class="kw">WHERE</span> <span class="vr">age</span> > <span class="nm">28</span>;</div>
        <h3>Comparison operators</h3>
        <ul>
          <li><code>=</code> — equal to</li>
          <li><code>!=</code> or <code>&lt;&gt;</code> — not equal</li>
          <li><code>&lt;</code>, <code>&gt;</code>, <code>&lt;=</code>, <code>&gt;=</code> — numeric comparisons</li>
        </ul>
        <h3>Text comparison</h3>
        <div class="code-block"><span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="vr">users</span> <span class="kw">WHERE</span> <span class="vr">name</span> = <span class="st">'Alice'</span>; <span class="cm">-- single quotes for strings</span></div>
        <h3>LIKE — pattern matching</h3>
        <p>Use <code>LIKE</code> to search text with wildcards. <code>%</code> matches any sequence of characters:</p>
        <div class="code-block"><span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="vr">users</span> <span class="kw">WHERE</span> <span class="vr">name</span> <span class="kw">LIKE</span> <span class="st">'A%'</span>; <span class="cm">-- names starting with A</span></div>
        <div class="objective-box">
          <div class="objective-label">🎯 Objective</div>
          <div class="objective-text">Select all users where <code>age &gt; 28</code>. Alice (30) and Carol (35) should appear; Bob (25) should not.</div>
        </div>
      </div>`,
    hint: `<p>Add a WHERE clause after the table name:</p>
      <div class="code-block"><span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="vr">users</span> <span class="kw">WHERE</span> <span class="vr">age</span> > <span class="nm">28</span>;</div>`,
    solution: `<div class="code-block"><span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="vr">users</span> <span class="kw">WHERE</span> <span class="vr">age</span> > <span class="nm">28</span>;</div>`,
    starter: `-- Select users where age > 28\n`,
    check: (out, code, lines) => {
      const flat = lines.map(l => l.vals ? l.vals.join(' ') : '').join(' ');
      return flat.includes('Alice') && flat.includes('Carol') && !flat.includes('Bob');
    },
    bonus: {
      title: "Find users by name pattern",
      desc: "Use WHERE name LIKE 'C%' to find users whose name starts with C. Only Carol should appear.",
      xp: 30,
      check: (out, code, lines) => {
        const flat = lines.filter(l => l.type === 'row').map(l => l.vals.join(' ')).join(' ');
        return /LIKE/i.test(code) && flat.includes('Carol') && !flat.includes('Alice') && !flat.includes('Bob');
      },
    },
  },

  4: {
    title: "ORDER BY", xp: 100, fname: "order_by.sql",
    setup: `CREATE TABLE players (name TEXT, score INTEGER);
INSERT INTO players VALUES ('Alice',850),('Bob',920),('Carol',780);`,
    content: `
      <div class="lesson-num-tag">Lesson 4 · SQL Fundamentals</div>
      <h1 class="lesson-title-h">ORDER BY 📊</h1>
      <div class="lesson-body">
        <p><code>ORDER BY</code> sorts the result set. By default it sorts <strong>ASC</strong>ending (lowest first). Add <code>DESC</code> to reverse it.</p>
        <div class="code-block"><span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="vr">players</span>
  <span class="kw">ORDER BY</span> <span class="vr">score</span> <span class="kw">ASC</span>;  <span class="cm">-- lowest score first</span>

<span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="vr">players</span>
  <span class="kw">ORDER BY</span> <span class="vr">score</span> <span class="kw">DESC</span>; <span class="cm">-- highest score first (leaderboard)</span></div>
        <h3>Sort by multiple columns</h3>
        <div class="code-block"><span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="vr">players</span>
  <span class="kw">ORDER BY</span> <span class="vr">score</span> <span class="kw">DESC</span>, <span class="vr">name</span> <span class="kw">ASC</span>;</div>
        <p>The second sort column breaks ties — if two players have the same score, their names are sorted alphabetically.</p>
        <h3>Sorting text</h3>
        <p>ORDER BY works on text columns too, sorting alphabetically. <code>ORDER BY name ASC</code> gives A → Z; <code>DESC</code> gives Z → A.</p>
        <div class="objective-box">
          <div class="objective-label">🎯 Objective</div>
          <div class="objective-text">Select all players ordered by <code>score</code> descending (highest first). Bob (920) should come first.</div>
        </div>
      </div>`,
    hint: `<p>Use <code>ORDER BY score DESC</code> at the end of your query:</p>
      <div class="code-block"><span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="vr">players</span>
  <span class="kw">ORDER BY</span> <span class="vr">score</span> <span class="kw">DESC</span>;</div>`,
    solution: `<div class="code-block"><span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="vr">players</span>
  <span class="kw">ORDER BY</span> <span class="vr">score</span> <span class="kw">DESC</span>;</div>`,
    starter: `-- Select all players, highest score first\n`,
    check: (out, code, lines) => {
      const rows = lines.filter(l => l.type === 'row');
      if (rows.length < 2) return false;
      const firstRow = rows[0].vals.join(' ');
      return firstRow.includes('Bob');
    },
    bonus: {
      title: "Sort by name alphabetically",
      desc: "Select all players ordered by name ASC (A to Z). Alice should be in the first row.",
      xp: 35,
      check: (out, code, lines) => {
        const rows = lines.filter(l => l.type === 'row');
        return /ORDER\s+BY\s+name/i.test(code) && rows.length > 0 && rows[0].vals.join(' ').includes('Alice');
      },
    },
  },

  5: {
    title: "LIMIT", xp: 100, fname: "limit.sql",
    setup: `CREATE TABLE players (name TEXT, score INTEGER);
INSERT INTO players VALUES ('Alice',850),('Bob',920),('Carol',780);`,
    content: `
      <div class="lesson-num-tag">Lesson 5 · SQL Fundamentals</div>
      <h1 class="lesson-title-h">LIMIT 🔢</h1>
      <div class="lesson-body">
        <p><code>LIMIT</code> caps how many rows are returned. This is crucial for large tables — you don't want to accidentally pull millions of rows!</p>
        <div class="code-block"><span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="vr">players</span>
  <span class="kw">ORDER BY</span> <span class="vr">score</span> <span class="kw">DESC</span>
  <span class="kw">LIMIT</span> <span class="nm">3</span>; <span class="cm">-- top 3 players</span></div>
        <h3>OFFSET — skip rows</h3>
        <p>Combine <code>LIMIT</code> with <code>OFFSET</code> for pagination:</p>
        <div class="code-block"><span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="vr">players</span>
  <span class="kw">ORDER BY</span> <span class="vr">score</span> <span class="kw">DESC</span>
  <span class="kw">LIMIT</span> <span class="nm">2</span> <span class="kw">OFFSET</span> <span class="nm">1</span>; <span class="cm">-- rows 2 and 3</span></div>
        <h3>Real-world use: pagination</h3>
        <p>Every social feed or search results page uses <code>LIMIT</code>/<code>OFFSET</code> behind the scenes. "Page 3 of results, 10 per page" translates to <code>LIMIT 10 OFFSET 20</code>.</p>
        <div class="objective-box">
          <div class="objective-label">🎯 Objective</div>
          <div class="objective-text">Select the <strong>top 2 players</strong> by score (highest first). Your result should have exactly 2 data rows.</div>
        </div>
      </div>`,
    hint: `<p>Combine ORDER BY DESC with LIMIT:</p>
      <div class="code-block"><span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="vr">players</span>
  <span class="kw">ORDER BY</span> <span class="vr">score</span> <span class="kw">DESC</span>
  <span class="kw">LIMIT</span> <span class="nm">2</span>;</div>`,
    solution: `<div class="code-block"><span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="vr">players</span>
  <span class="kw">ORDER BY</span> <span class="vr">score</span> <span class="kw">DESC</span>
  <span class="kw">LIMIT</span> <span class="nm">2</span>;</div>`,
    starter: `-- Select top 2 players by score\n`,
    check: (out, code, lines) => {
      const rows = lines.filter(l => l.type === 'row');
      return rows.length === 2 && /LIMIT/i.test(code);
    },
    bonus: {
      title: "Page 2 of results",
      desc: "Use LIMIT 1 OFFSET 1 to get the second-place player (Bob, 920 → skip; Carol, 780 → skip; Alice, 850 ordered DESC means Bob first). With ORDER BY score DESC, OFFSET 1 should give Alice.",
      xp: 35,
      check: (out, code, lines) => {
        const rows = lines.filter(l => l.type === 'row');
        return /OFFSET/i.test(code) && rows.length === 1 && rows[0].vals.join(' ').includes('Alice');
      },
    },
  },

  6: {
    title: "AND / OR", xp: 125, fname: "and_or.sql",
    setup: `CREATE TABLE products (name TEXT, price REAL, in_stock INTEGER);
INSERT INTO products VALUES ('Apple',0.99,1),('Banana',0.5,1),('Cherry',2.99,0),('Date',4.99,1);`,

      <div class="lesson-num-tag">Lesson 6 · SQL Fundamentals</div>
      <h1 class="lesson-title-h">AND / OR ⚡</h1>
      <div class="lesson-body">
        <p>Combine multiple conditions in a <code>WHERE</code> clause using <code>AND</code> (both must be true) or <code>OR</code> (either must be true).</p>
        <div class="code-block"><span class="cm">-- AND: both conditions must match</span>

<span class="cm">-- OR: at least one condition must match</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="vr">products</span>
  <span class="kw">WHERE</span> <span class="vr">name</span> = <span class="st">'Apple'</span> <span class="kw">OR</span> <span class="vr">name</span> = <span class="st">'Banana'</span>;</div>
        <h3>Grouping with parentheses</h3>
        <div class="code-block"><span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="vr">products</span>

        <div class="objective-box">
          <div class="objective-label">🎯 Objective</div>
          <div class="objective-text">Select products where <code>price &lt; 2</code> <strong>AND</strong> <code>in_stock = 1</code>. Apple and Banana should appear.</div>
        </div>
      </div>`,
    hint: `<p>Use AND to require both conditions:</p>
      <div class="code-block"><span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="vr">products</span>

// SQL SYNTAX HIGHLIGHTER
// ═══════════════════════════════════════════════════════════
function sqlHighlight(src) {
  const KEYWORDS = /\b(SELECT|FROM|WHERE|ORDER\s+BY|GROUP\s+BY|HAVING|LIMIT|OFFSET|INSERT\s+INTO|VALUES|UPDATE|SET|DELETE\s+FROM|DELETE|INNER\s+JOIN|LEFT\s+JOIN|RIGHT\s+JOIN|JOIN|ON|AND|OR|NOT|NULL|AS|DISTINCT|CREATE\s+TABLE|CREATE|TABLE|DROP|ALTER|ADD|COLUMN|PRIMARY\s+KEY|FOREIGN\s+KEY|REFERENCES|ASC|DESC|IN|BETWEEN|LIKE|IS|EXISTS|CASE|WHEN|THEN|ELSE|END)\b/gi;
  const FUNCTIONS = /\b(COUNT|SUM|AVG|MIN|MAX|COALESCE|IFNULL|LENGTH|UPPER|LOWER|TRIM|ROUND|ABS|STRFTIME|DATE)\s*(?=\()/gi;
  const NUMBERS   = /\b(\d+(?:\.\d+)?)\b/g;
  const STRINGS   = /'(?:[^'\\]|\\.)*'/g;
  const COMMENTS  = /--[^\n]*/g;

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // Tokenize character-by-character to avoid nested replacements
  let result = '';
  let i = 0;
  const n = src.length;

  while (i < n) {
    // -- comment
    if (src[i] === '-' && src[i+1] === '-') {
      let end = src.indexOf('\n', i);
      if (end === -1) end = n;
      result += `<span class="cm">${esc(src.slice(i, end))}</span>`;
      i = end;
      continue;
    }
    // string literal
    if (src[i] === "'") {
      let j = i + 1;
      while (j < n && !(src[j] === "'" && src[j-1] !== '\\')) j++;
      j++;
      result += `<span class="st">${esc(src.slice(i, j))}</span>`;
      i = j;
      continue;
    }
    // try to match a word (keyword, function, identifier, number)
    const wordMatch = /^[A-Za-z_]\w*/.exec(src.slice(i));
    const numMatch  = /^\d+(?:\.\d+)?/.exec(src.slice(i));

    if (numMatch && (!wordMatch || numMatch[0].length <= wordMatch[0].length)) {
      result += `<span class="nm">${esc(numMatch[0])}</span>`;
      i += numMatch[0].length;
      continue;
    }
    if (wordMatch) {
      const word = wordMatch[0];
      // peek ahead for compound keywords (ORDER BY, GROUP BY, INSERT INTO, DELETE FROM)
      const rest = src.slice(i);
      const compound = /^(ORDER\s+BY|GROUP\s+BY|INSERT\s+INTO|DELETE\s+FROM|INNER\s+JOIN|LEFT\s+JOIN|RIGHT\s+JOIN|CREATE\s+TABLE|PRIMARY\s+KEY|FOREIGN\s+KEY)/i.exec(rest);
      if (compound) {
        result += `<span class="kw">${esc(compound[0])}</span>`;
        i += compound[0].length;
        continue;
      }
      const kwTest = /^(SELECT|FROM|WHERE|HAVING|LIMIT|OFFSET|VALUES|UPDATE|SET|DELETE|INSERT|INTO|JOIN|ON|AND|OR|NOT|NULL|AS|DISTINCT|CREATE|TABLE|DROP|ALTER|ADD|COLUMN|ASC|DESC|IN|BETWEEN|LIKE|IS|EXISTS|CASE|WHEN|THEN|ELSE|END|ORDER|GROUP|BY)$/i;
      const fnTest = /^(COUNT|SUM|AVG|MIN|MAX|COALESCE|IFNULL|LENGTH|UPPER|LOWER|TRIM|ROUND|ABS|STRFTIME|DATE)$/i;
      if (fnTest.test(word) && src[i + word.length] === '(') {
        result += `<span class="fn">${esc(word)}</span>`;
      } else if (kwTest.test(word)) {
        result += `<span class="kw">${esc(word)}</span>`;
      } else {
        result += `<span class="vr">${esc(word)}</span>`;
      }
      i += word.length;
      continue;
    }
    result += esc(src[i]);
    i++;
  }
  return result;
}

  if (wrap.classList.contains('locked')) {
    solBtn.animate([
      { transform: 'translateX(0)' },
      { transform: 'translateX(-6px)' },
      { transform: 'translateX(6px)' },
      { transform: 'translateX(-4px)' },
      { transform: 'translateX(0)' },
    ], { duration: 280, easing: 'ease-out' });
    return;
  }
  const open = solBody.classList.toggle('open');
  solBtn.classList.toggle('open', open);
});

// ═══════════════════════════════════════════════════════════
// OUTPUT
// ═══════════════════════════════════════════════════════════
const escHtml = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function setOutput(lines, status) {
  const ob = document.getElementById('output-body');
  ob.innerHTML = lines.map(l => {
    if (l.type==='placeholder') return `<span class="out-placeholder">${l.text}</span>`;
    if (l.type==='error')       return `<span class="out-error">${escHtml(l.text)}</span>`;
    if (l.type==='ok')          return `<span class="out-line">${escHtml(l.text)}</span>`;
    if (l.type==='header') return `<div style="display:flex;gap:1rem;border-bottom:1px solid rgba(255,255,255,0.08);padding-bottom:0.3rem;margin-bottom:0.3rem;">${l.cols.map(c=>`<span style="font-weight:700;color:var(--primary-l);min-width:80px">${escHtml(String(c))}</span>`).join('')}</div>`;
    if (l.type==='row')    return `<div style="display:flex;gap:1rem;padding:0.1rem 0;">${l.vals.map(v=>`<span style="color:var(--green);min-width:80px">${escHtml(String(v??'NULL'))}</span>`).join('')}</div>`;
    return '';
  }).join('');
  const st = document.getElementById('output-status');
  st.className = 'output-status';
  const map = {running:['os-running','Running…'],ok:['os-ok','Done'],error:['os-error','Error'],idle:['os-idle','Idle']};
  const [cls,txt] = map[status]||map.idle;
  st.classList.add(cls); st.textContent = txt;
}

// ═══════════════════════════════════════════════════════════
// SQL RUNNER
// ═══════════════════════════════════════════════════════════
let SQL = null;
let outputLines = [];

async function loadSQL() {
  try {
    SQL = await window.initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}` });
    document.getElementById('py-loader').classList.add('hidden');
    document.getElementById('btn-run').disabled    = false;
    document.getElementById('btn-submit').disabled = false;
  } catch(e) {
    document.querySelector('.py-loader-text').textContent = 'Failed to load SQL engine.';
  }
}
loadSQL();

function runCode(forSubmit = false, forBonus = false) {
  if (!SQL) return;

  // Run guard — don't run if code is only comments/blanks
  const meaningful = editor.value.split('\n').some(l => {
    const t = l.trim();
    return t.length > 0 && !t.startsWith('--');
  });
  if (!meaningful) {
    setOutput([{type:'placeholder', text:'Write some SQL first!'}], 'idle');
    return;
  }

  outputLines = [];
  setOutput([{type:'placeholder',text:''}], 'running');

  try {
    const db = new SQL.Database();
    if (lesson.setup) db.exec(lesson.setup);
    const results = db.exec(editor.value.trim());
    if (!results.length) {
      outputLines.push({type:'ok', text:'Query OK. (no rows returned)'});
    } else {
      results.forEach(r => {
        outputLines.push({type:'header', cols: r.columns});
        r.values.forEach(row => outputLines.push({type:'row', vals: row}));
      });
    }
    db.close();
  } catch(err) {
    outputLines.push({type:'error', text: err.message});
  }

  const hasErr = outputLines.some(l=>l.type==='error');
  setOutput(outputLines, hasErr ? 'error' : 'ok');
  if (!hasRun) { hasRun = true; unlockSolution(); }
  if (forBonus) { checkBonus(); return; }
  if (forSubmit) checkAnswer();
}

document.getElementById('btn-run').addEventListener('click',    () => runCode(false));
document.getElementById('btn-submit').addEventListener('click', () => runCode(true));

// ═══════════════════════════════════════════════════════════
// CHECK & COMPLETE
// ═══════════════════════════════════════════════════════════
function checkAnswer() {
  const out  = outputLines.map(l=>l.text||'').join('\n');
  const code = editor.value;
  if (lesson.check(out, code, outputLines)) {
    completeLesson();
  } else {
    const st = document.getElementById('output-status');
    st.className = 'output-status os-error'; st.textContent = 'Not quite — check the hint!';
    setTimeout(() => { st.className = 'output-status os-ok'; st.textContent = 'Done'; }, 2500);
  }
}

function completeLesson() {
  const state = loadState();
  const langProgress = loadLangProgress();
  const earned = !langProgress.completedIds.includes(lessonId);
  if (earned) {
    langProgress.completedIds.push(lessonId);
    state.xp += lesson.xp;
    state.lessonsCompleted = (state.completedIds||[]).length + langProgress.completedIds.length;
    state.level = getLevel(state.xp);
    saveState(state); saveLangProgress(langProgress);
  }
  document.getElementById('progress-fill').style.width = (lessonId/TOTAL*100)+'%';
  showModal(earned ? lesson.xp : 0);
}

// ═══════════════════════════════════════════════════════════
// MODAL + XP COUNTER ANIMATION
// ═══════════════════════════════════════════════════════════
function showModal(xpEarned) {
  const nextId  = lessonId + 1;
  const hasNext = !!LESSONS[nextId];
  document.getElementById('modal-sub').textContent =
    hasNext ? `Lesson ${lessonId} of ${TOTAL} complete. Keep going!`
            : '🎓 You finished all lessons in this track!';
  const btn = document.getElementById('modal-next');
  btn.textContent = hasNext ? 'Next Lesson →' : 'Back to Dashboard';
  btn.onclick = () => window.location.href = hasNext ? `lesson-sql.html?id=${nextId}` : 'dashboard.html';

  const el = document.getElementById('modal-xp-count');
  el.textContent = '0';
  let current = 0;
  const step  = Math.ceil(xpEarned / 30);
  const timer = setInterval(() => {
    current = Math.min(current + step, xpEarned);
    el.textContent = current;
    if (current >= xpEarned) clearInterval(timer);
  }, 28);

  document.getElementById('modal').classList.add('show');
  document.getElementById('nav-xp').textContent = loadState().xp;

  if (xpEarned > 0) launchConfetti();
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('show');
});

// ═══════════════════════════════════════════════════════════
// CONFETTI
// ═══════════════════════════════════════════════════════════
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.classList.add('active');

  const COLORS = ['#6366F1','#F59E0B','#10B981','#EF4444','#22D3EE','#818CF8','#FDE68A'];
  const pieces = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height * 0.5,
    w: 6 + Math.random() * 8,
    h: 4 + Math.random() * 6,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    vx: (Math.random() - 0.5) * 3,
    vy: 2 + Math.random() * 4,
    rot: Math.random() * Math.PI * 2,
    vrot: (Math.random() - 0.5) * 0.15,
    opacity: 1,
  }));

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.x   += p.vx;
      p.y   += p.vy;
      p.rot += p.vrot;
      p.vy  += 0.06;
      if (frame > 90) p.opacity = Math.max(0, p.opacity - 0.018);
      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    frame++;
    if (frame < 160) requestAnimationFrame(draw);
    else { canvas.classList.remove('active'); ctx.clearRect(0, 0, canvas.width, canvas.height); }
  }
  requestAnimationFrame(draw);
}
</script>
