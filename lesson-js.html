<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <script src="analytics.js" defer></script>
  <link rel="canonical" href="https://learnhelix.org/lesson-js.html" />
  <title>Helix — JavaScript</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #050816;
      --bg-2:     #0C1022;
      --bg-card:  rgba(255,255,255,0.04);
      --border:   rgba(255,255,255,0.07);
      --border-hi: rgba(99,102,241,0.3);
      --primary:  #6366F1;
      --primary-l: #818CF8;
      --cyan:     #22D3EE;
      --accent:   #F59E0B;
      --text:     #EEF2F8;
      --text-2:   #8892A4;
      --text-3:   #2D3A4E;
      --green:    #10B981;
      --yellow:   #F59E0B;
      --red:      #EF4444;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; line-height: 1.6;
      overflow: hidden; display: flex; flex-direction: column;
    }
    .aurora {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; overflow: hidden;
      filter: blur(100px) saturate(120%);
    }
    .orb { position: absolute; border-radius: 50%; animation-direction: alternate; animation-iteration-count: infinite; }
    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(99,102,241,0.35) 0%, transparent 65%); top: -100px; left: -100px; animation: drift1 25s ease-in-out infinite alternate; }
    .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(139,92,246,0.25) 0%, transparent 65%); bottom: -100px; right: -100px; animation: drift2 20s ease-in-out infinite alternate; }
    @keyframes drift1 { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(60px,80px) scale(1.1); } }
    @keyframes drift2 { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(-60px,-60px) scale(1.08); } }
    @media (prefers-reduced-motion: reduce) { .orb { animation: none; } }

    /* ─── NAVBAR ──────────────────────────────────────────── */
    nav {
      height: 56px; padding: 0 1.5rem; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(5,8,22,0.85);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }
    .nav-left  { display: flex; align-items: center; gap: 1rem; }
    .nav-right { display: flex; align-items: center; gap: 0.75rem; }
    .btn-back {
      display: flex; align-items: center; gap: 0.4rem;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: var(--text-2); font-size: 0.8rem; font-weight: 600;
      padding: 0.38rem 0.9rem; border-radius: 8px; cursor: pointer;
      font-family: inherit; text-decoration: none;
      transition: background 0.18s, color 0.18s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.07); color: var(--text); }
    .lesson-breadcrumb { font-size: 0.82rem; color: var(--text-3); }
    .lesson-breadcrumb strong { color: var(--text-2); font-weight: 600; }
    .xp-badge {
      display: flex; align-items: center; gap: 0.35rem;
      background: rgba(255,179,71,0.08); border: 1px solid rgba(255,179,71,0.18);
      color: var(--yellow); font-size: 0.78rem; font-weight: 700;
      padding: 0.28rem 0.7rem; border-radius: 100px;
    }
    .streak-badge {
      display: flex; align-items: center; gap: 0.35rem;
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.18);
      color: var(--red); font-size: 0.78rem; font-weight: 700;
      padding: 0.28rem 0.7rem; border-radius: 100px;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .streak-badge.shielded {
      background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3);
      color: #FCD34D;
    }
    .shield-icon { font-size: 0.75em; opacity: 0.9; }
    .btn-primary {
      background: var(--primary);
      border: 1px solid rgba(255,255,255,0.1); color: white;
      font-family: inherit; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; padding: 0.45rem 1.2rem; border-radius: 9px;
      box-shadow: 0 4px 16px rgba(99,102,241,0.28);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(99,102,241,0.38); }
    .btn-primary:disabled { opacity: 0.45; pointer-events: none; }

    /* ─── PROGRESS ────────────────────────────────────────── */
    .lesson-progress { height: 3px; background: rgba(255,255,255,0.05); flex-shrink: 0; }
    .lesson-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transition: width 0.6s ease;
    }

    /* ─── SPLIT ───────────────────────────────────────────── */
    .split {
      flex: 1; display: grid; grid-template-columns: 1fr 1fr;
      overflow: hidden; min-height: 0; position: relative; z-index: 1;
    }

    /* ─── LEFT PANEL ──────────────────────────────────────── */
    .panel-left {
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .panel-left-inner {
      flex: 1; overflow-y: auto; padding: 2rem 2rem 1rem;
    }
    .panel-left-inner::-webkit-scrollbar { width: 4px; }
    .panel-left-inner::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

    .lesson-num-tag {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--primary); margin-bottom: 0.5rem;
    }
    .lesson-title-h {
      font-size: 1.55rem; font-weight: 800; letter-spacing: -0.025em;
      line-height: 1.2; margin-bottom: 1.4rem;
    }
    .lesson-body { font-size: 0.9rem; color: var(--text-2); line-height: 1.82; }
    .lesson-body p  { margin-bottom: 1rem; }
    .lesson-body h3 { font-size: 0.95rem; font-weight: 700; color: var(--text); margin: 1.4rem 0 0.6rem; }
    .lesson-body ul { padding-left: 1.2rem; margin-bottom: 1rem; }
    .lesson-body ul li { margin-bottom: 0.3rem; }
    .lesson-body code {
      font-family: 'JetBrains Mono', monospace; font-size: 0.82em;
      background: rgba(99,102,241,0.1); color: #C4B5FD;
      padding: 0.12em 0.38em; border-radius: 5px;
      border: 1px solid rgba(99,102,241,0.18);
    }
    .lesson-body .code-block {
      background: #05091A; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px; padding: 1rem 1.2rem; margin: 1rem 0;
      font-family: 'JetBrains Mono', monospace; font-size: 0.82rem;
      line-height: 1.9; overflow-x: auto; white-space: pre-wrap;
    }
    .kw  { color: #C792EA; } .fn  { color: #82AAFF; } .st  { color: #C3E88D; }
    .cm  { color: #3D4F5C; font-style: italic; } .vr  { color: #F78C6C; } .nm  { color: #F78C6C; }

    .objective-box {
      margin: 1.5rem 0 0;
      background: rgba(245,158,11,0.06); border: 1px solid rgba(245,158,11,0.2);
      border-radius: 14px; padding: 1.2rem 1.3rem;
    }
    .objective-label {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 0.6rem;
    }
    .objective-text { font-size: 0.9rem; color: var(--text); font-weight: 600; line-height: 1.55; }
    .bonus-box {
      margin: 1rem 0 0;
      background: rgba(34,211,238,0.04); border: 1px solid rgba(34,211,238,0.16);
      border-radius: 14px; padding: 1.2rem 1.3rem;
    }
    .bonus-label {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--cyan); margin-bottom: 0.5rem;
    }
    .bonus-title { font-size: 0.88rem; font-weight: 700; color: var(--text); margin-bottom: 0.35rem; }
    .bonus-text { font-size: 0.87rem; color: var(--text-2); line-height: 1.55; margin-bottom: 0.85rem; }
    .btn-bonus-submit {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: rgba(34,211,238,0.09); border: 1px solid rgba(34,211,238,0.26);
      color: var(--cyan); font-family: inherit; font-size: 0.82rem; font-weight: 700;
      cursor: pointer; padding: 0.42rem 1.1rem; border-radius: 8px;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .btn-bonus-submit:hover { background: rgba(34,211,238,0.16); box-shadow: 0 3px 12px rgba(34,211,238,0.14); }
    .btn-bonus-submit:disabled { opacity: 0.4; pointer-events: none; }
    .bonus-feedback { margin-top: 0.6rem; font-size: 0.82rem; font-weight: 600; display: none; padding: 0.35rem 0.6rem; border-radius: 7px; }
    .bonus-feedback.success { color: var(--green); background: rgba(16,185,129,0.08); display: block; }
    .bonus-feedback.fail    { color: var(--red); background: rgba(239,68,68,0.07); display: block; }

    /* Hint / solution */
    .extras { padding: 0 2rem 1.5rem; display: flex; flex-direction: column; gap: 0.6rem; }
    .collapsible { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
    .collapsible-header {
      width: 100%; display: flex; align-items: center; gap: 0.6rem;
      padding: 0.75rem 1rem; background: var(--bg-card);
      border: none; cursor: pointer; font-family: inherit;
      font-size: 0.85rem; font-weight: 600; color: var(--text-2);
      text-align: left; transition: background 0.18s, color 0.18s;
    }
    .collapsible-header:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .collapsible-header .chevron { margin-left: auto; font-size: 0.7rem; transition: transform 0.25s; }
    .collapsible-header.open .chevron { transform: rotate(180deg); }
    .collapsible-hint     { border-color: rgba(255,179,71,0.2); }
    .collapsible-hint .collapsible-header   { color: rgba(255,179,71,0.8); }
    .collapsible-solution { border-color: rgba(74,222,128,0.18); }
    .collapsible-solution .collapsible-header { color: rgba(74,222,128,0.8); }
    .collapsible-cheatsheet { border-color: rgba(245,158,11,0.2); }
    .collapsible-cheatsheet .collapsible-header { color: rgba(253,212,77,0.85); }
    .cs-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 0.1rem; }
    .cs-table tr { border-bottom: 1px solid rgba(255,255,255,0.04); }
    .cs-table tr:last-child { border-bottom: none; }
    .cs-table td { padding: 0.45rem 0.75rem; vertical-align: top; line-height: 1.5; }
    .cs-table td:first-child {
      font-family: 'JetBrains Mono', monospace; font-size: 0.76rem;
      color: #FCD34D; white-space: nowrap; width: 1%; padding-right: 1.2rem;
      background: rgba(245,158,11,0.05);
    }
    .cs-table td:last-child { color: var(--text-2); }

    /* Locked solution state */
    .collapsible-solution.locked {
      border-color: var(--border);
      opacity: 0.5;
    }
    .collapsible-solution.locked .collapsible-header {
      color: var(--text-3);
      cursor: not-allowed;
    }
    .collapsible-solution.locked .collapsible-header:hover {
      background: var(--bg-card);
      color: var(--text-3);
    }
    .sol-lock-msg {
      font-size: 0.72rem; color: var(--text-3);
      margin-left: auto; margin-right: 0.4rem;
      font-style: italic; white-space: nowrap;
    }
    .collapsible-solution:not(.locked) .sol-lock-msg { display: none; }
    .collapsible-body {
      display: none; padding: 1rem;
      font-size: 0.85rem; line-height: 1.72; color: var(--text-2);
      background: rgba(0,0,0,0.15); border-top: 1px solid var(--border);
    }
    .collapsible-body.open { display: block; }
    .collapsible-body code {
      font-family: 'JetBrains Mono', monospace; font-size: 0.82em;
      background: rgba(99,102,241,0.08); color: #C4B5FD;
      padding: 0.1em 0.35em; border-radius: 5px;
    }
    .collapsible-body .code-block {
      background: #05091A; border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; padding: 0.9rem 1.1rem; margin-top: 0.75rem;
      font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; line-height: 1.9;
      overflow-x: auto; white-space: pre-wrap;
    }

    /* ─── RIGHT PANEL ─────────────────────────────────────── */
    .panel-right { display: flex; flex-direction: column; overflow: hidden; }
    .editor-toolbar {
      padding: 0.65rem 1.2rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.6rem;
      background: rgba(6,10,20,0.6); flex-shrink: 0;
    }
    .win-dots { display: flex; gap: 5px; }
    .wd { width: 10px; height: 10px; border-radius: 50%; }
    .wd.r { background: #FF5F57; } .wd.y { background: #FFBD2E; } .wd.g { background: #28C840; }
    .editor-fname { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-3); margin-left: 0.4rem; flex: 1; }
    .kbd-hint {
      font-size: 0.62rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace;
      white-space: nowrap; flex-shrink: 0; user-select: none; letter-spacing: 0.02em;
    }
    @media (max-width: 600px) { .kbd-hint { display: none; } }
    .btn-run {
      display: flex; align-items: center; gap: 0.45rem;
      background: linear-gradient(135deg, #22C55E, #16A34A);
      border: none; color: white; font-family: inherit;
      font-size: 0.82rem; font-weight: 700;
      cursor: pointer; padding: 0.42rem 1.1rem; border-radius: 8px;
      box-shadow: 0 3px 14px rgba(74,222,128,0.22);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-run:hover { transform: translateY(-1px); box-shadow: 0 5px 20px rgba(74,222,128,0.32); }
    .btn-run:disabled { opacity: 0.4; pointer-events: none; }
    .btn-clear {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: var(--text-3); font-family: inherit; font-size: 0.78rem;
      cursor: pointer; padding: 0.42rem 0.85rem; border-radius: 8px;
      transition: background 0.15s, color 0.15s;
    }
    .btn-clear:hover { background: rgba(255,255,255,0.07); color: var(--text-2); }

    .editor-wrap { flex: 1; display: flex; overflow: hidden; position: relative; min-height: 0; }
    .line-nums {
      padding: 1.1rem 0.75rem 1.1rem 1rem;
      font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; line-height: 1.9;
      color: var(--text-3); text-align: right; user-select: none;
      background: rgba(0,0,0,0.15); border-right: 1px solid rgba(255,255,255,0.04);
      min-width: 44px; overflow: hidden; flex-shrink: 0;
    }
    .editor-code-area {
      flex: 1; position: relative; overflow: hidden; background: #050C1A;
    }
    .editor-textarea {
      position: absolute; inset: 0;
      resize: none; border: none; outline: none;
      background: transparent; color: transparent;
      font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; line-height: 1.9;
      padding: 1.1rem 1.2rem; tab-size: 2;
      caret-color: var(--accent);
      overflow-y: auto; overflow-x: hidden;
      z-index: 1; white-space: pre-wrap; word-break: break-word;
      width: 100%; height: 100%; box-sizing: border-box;
    }
    .editor-textarea::selection { background: rgba(245,158,11,0.25); }
    .editor-textarea::-webkit-scrollbar { width: 4px; height: 4px; }
    .editor-textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
    .hl-pre {
      position: absolute; inset: 0; margin: 0; border: none; outline: none;
      font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; line-height: 1.9;
      padding: 1.1rem 1.2rem; tab-size: 2;
      overflow: hidden; pointer-events: none;
      white-space: pre-wrap; word-break: break-word;
      background: #050C1A; color: #D4D4F8; z-index: 0;
      width: 100%; height: 100%; box-sizing: border-box;
    }
    .editor-wrap { background: #050C1A; }

    /* Output */
    .output-panel {
      border-top: 1px solid var(--border); flex-shrink: 0;
      display: flex; flex-direction: column; max-height: 38%;
    }
    .output-header {
      padding: 0.55rem 1.2rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.5rem;
      background: rgba(0,0,0,0.2); flex-shrink: 0;
    }
    .output-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-3); flex: 1; }
    .output-status { font-size: 0.68rem; font-weight: 700; padding: 0.14rem 0.55rem; border-radius: 6px; }
    .os-running { background: rgba(255,179,71,0.1);  color: var(--yellow); }
    .os-ok      {
      background: rgba(52,211,153,0.1); color: #34D399;
      text-shadow: 0 0 8px rgba(52,211,153,0.55);
      box-shadow: 0 0 10px rgba(52,211,153,0.12);
    }
    .os-error   { background: rgba(255,107,107,0.1); color: var(--red);    }
    .os-idle    { background: rgba(255,255,255,0.04); color: var(--text-3); }
    .output-body {
      flex: 1; overflow-y: auto; padding: 0.9rem 1.2rem;
      font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; line-height: 1.85;
      background: #040810; transition: box-shadow 0.4s ease;
    }
    .output-body.glow-ok {
      box-shadow: inset 0 0 40px rgba(52,211,153,0.05), inset 0 -1px 0 rgba(52,211,153,0.08);
    }
    .output-body::-webkit-scrollbar { width: 4px; }
    .output-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 4px; }
    @keyframes line-appear {
      from { opacity: 0; transform: translateX(-6px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .out-line {
      color: #34D399;
      text-shadow: 0 0 10px rgba(52,211,153,0.6), 0 0 24px rgba(52,211,153,0.22);
      white-space: pre-wrap; word-break: break-word; display: block;
      animation: line-appear 0.18s ease-out both;
    }
    @media (prefers-reduced-motion: reduce) { .out-line { animation: none; } }
    .out-error       { color: var(--red);   white-space: pre-wrap; word-break: break-word; display: block; }
    .out-placeholder { color: var(--text-3); font-style: italic; }

    /* ─── COMPLETION MODAL ────────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px); z-index: 200;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.28s;
    }
    .modal-backdrop.show { opacity: 1; pointer-events: all; }
    .modal {
      background: #05091A; border: 1px solid rgba(99,102,241,0.28);
      border-radius: 26px; padding: 2.5rem 2.5rem 2rem;
      max-width: 420px; width: 90%; text-align: center;
      transform: translateY(24px) scale(0.95);
      transition: transform 0.32s cubic-bezier(0.34,1.55,0.64,1);
      box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 60px rgba(99,102,241,0.10);
      position: relative; overflow: hidden;
    }
    .modal-backdrop.show .modal { transform: translateY(0) scale(1); }

    /* Pip in modal */
    .modal-pip-wrap { margin-bottom: 1rem; animation: pip-bounce 0.7s ease; }
    @keyframes pip-bounce {
      0%   { transform: translateY(-30px) scale(0.7); opacity: 0; }
      60%  { transform: translateY(5px) scale(1.05); opacity: 1; }
      100% { transform: translateY(0) scale(1); }
    }
    .modal-title { font-size: 1.45rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.4rem; }
    .modal-sub   { font-size: 0.88rem; color: var(--text-2); margin-bottom: 1.5rem; line-height: 1.6; }
    .modal-xp-wrap {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: rgba(255,179,71,0.1); border: 1px solid rgba(255,179,71,0.22);
      color: var(--yellow); font-size: 1.15rem; font-weight: 800;
      padding: 0.55rem 1.6rem; border-radius: 100px; margin-bottom: 1.6rem;
    }
    .modal-xp-count { transition: all 0.1s; }
    .modal-actions { display: flex; gap: 0.75rem; justify-content: center; }
    .btn-modal-next {
      background: var(--primary);
      border: 1px solid rgba(255,255,255,0.1); color: white;
      font-family: inherit; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; padding: 0.7rem 1.8rem; border-radius: 12px;
      box-shadow: 0 4px 20px rgba(99,102,241,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-modal-next:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(99,102,241,0.4); }
    .btn-modal-dash {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: var(--text-2); font-family: inherit; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; padding: 0.7rem 1.4rem; border-radius: 12px;
      transition: background 0.15s, color 0.15s;
    }
    .btn-modal-dash:hover { background: rgba(255,255,255,0.07); color: var(--text); }

    /* ─── CONFETTI CANVAS ─────────────────────────────────── */
    #confetti-canvas {

        <p>Every programmer's first step is making the computer say something. In JavaScript, <code>console.log()</code> prints output to the console.</p>

<span class="fn">console</span>.<span class="fn">log</span>(<span class="st">"Second line"</span>);</div>

        <p>Variables store values. JavaScript has three declaration keywords:</p>

          <li><code>const</code> — value cannot be reassigned (preferred when possible)</li>
          <li><code>let</code> — value can be reassigned, block-scoped</li>

<span class="vr">score</span> = <span class="nm">200</span>;         <span class="cm">// let can be reassigned</span>

});

        <div class="code-block"><span class="kw">async function</span> <span class="fn">fetchData</span>() {
  <span class="kw">const</span> <span class="vr">result</span> = <span class="kw">await</span> <span class="fn">Promise</span>.<span class="fn">resolve</span>(<span class="st">"data loaded"</span>);
  <span class="fn">console</span>.<span class="fn">log</span>(<span class="vr">result</span>);  <span class="cm">// data loaded</span>
}
<span class="fn">fetchData</span>();</div>

// ─── JavaScript Syntax Highlighter ──────────────────────────
const JS_KEYWORDS = new Set(['break','case','catch','class','const','continue','debugger',
  'default','delete','do','else','export','extends','false','finally','for','function',
  'if','import','in','instanceof','let','new','null','return','static','super','switch',
  'this','throw','true','try','typeof','undefined','var','void','while','with','yield',
  'async','await','of']);
const JS_BUILTINS = new Set(['console','Math','Array','Object','String','Number','Boolean',
  'JSON','Promise','Date','Error','Map','Set','Symbol','parseInt','parseFloat','isNaN',
  'isFinite','setTimeout','clearTimeout','setInterval','clearInterval','fetch',
  'document','window','alert','confirm','log','warn','error','push','pop','map',
  'filter','reduce','forEach','find','some','every','includes','length','keys','values']);

function jsHighlight(src) {
  let out = ''; let i = 0; const n = src.length;
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  while (i < n) {
    // Line comment
    if (src[i]==='/' && src[i+1]==='/') {
      let j = i; while (j < n && src[j] !== '\n') j++;
      out += `<span class="cm">${esc(src.slice(i,j))}</span>`; i = j; continue;
    }
    // Block comment
    if (src[i]==='/' && src[i+1]==='*') {
      let j = i+2; while (j < n-1 && !(src[j]==='*' && src[j+1]==='/')) j++;
      j += 2;
      out += `<span class="cm">${esc(src.slice(i,j))}</span>`; i = j; continue;
    }
    // Template literal
    if (src[i]==='`') {
      let j = i+1;
      while (j < n && src[j]!=='`') { if (src[j]==='\\') j++; j++; }
      j++;
      out += `<span class="st">${esc(src.slice(i,j))}</span>`; i = j; continue;
    }
    // String literals
    if (src[i]==='"' || src[i]==="'") {
      const q = src[i]; let j = i+1;
      while (j < n && src[j] !== q && src[j] !== '\n') { if (src[j]==='\\') j++; j++; }
      j++;
      out += `<span class="st">${esc(src.slice(i,j))}</span>`; i = j; continue;
    }
    // Numbers
    if (src[i] >= '0' && src[i] <= '9') {
      let j = i;
      while (j < n && (src[j] >= '0' && src[j] <= '9' || src[j]==='.' || src[j]==='x' ||
             (src[j] >= 'a' && src[j] <= 'f') || (src[j] >= 'A' && src[j] <= 'F'))) j++;
      out += `<span class="nm">${esc(src.slice(i,j))}</span>`; i = j; continue;
    }
    // Identifiers
    if ((src[i] >= 'a' && src[i] <= 'z') || (src[i] >= 'A' && src[i] <= 'Z') || src[i]==='_' || src[i]==='$') {
      let j = i;
      while (j < n && ((src[j] >= 'a' && src[j] <= 'z') || (src[j] >= 'A' && src[j] <= 'Z') ||
             (src[j] >= '0' && src[j] <= '9') || src[j]==='_' || src[j]==='$')) j++;
      const word = src.slice(i,j);
      if (JS_KEYWORDS.has(word))       out += `<span class="kw">${esc(word)}</span>`;
      else if (JS_BUILTINS.has(word))  out += `<span class="fn">${esc(word)}</span>`;
      else out += `<span class="vr">${esc(word)}</span>`;
      i = j; continue;
    }
    out += esc(src[i]); i++;
  }
  return out;
}

const hlPre = document.getElementById('hl-pre');
function updateHighlight() {
  hlPre.innerHTML = jsHighlight(editor.value) + '\n';
}

function syncScroll() {
  hlPre.scrollTop  = editor.scrollTop;

}

editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart, end = editor.selectionEnd;
    editor.value = editor.value.substring(0, s) + '  ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = s + 2;
    updateLineNums(); updateHighlight();
    return;
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    e.preventDefault();
    if (e.shiftKey) {
      const btn = document.getElementById('btn-submit');
      if (!btn.disabled) runCode(true);
    } else {
      const btn = document.getElementById('btn-run');
      if (!btn.disabled) runCode(false);
    }
  }
});

// ═══════════════════════════════════════════════════════════
// OUTPUT
// ═══════════════════════════════════════════════════════════
function setOutput(lines, status) {
  const ob = document.getElementById('output-body');
  let lineIdx = 0;
  ob.innerHTML = lines.map(l => {
    if (l.type === 'placeholder') return `<span class="out-placeholder">${l.text}</span>`;
    if (l.type === 'error')       return `<span class="out-error">${escHtml(l.text)}</span>`;
    const delay = (lineIdx++ * 55);
    return `<span class="out-line" style="animation-delay:${delay}ms">${escHtml(l.text)}</span>`;
  }).join('');
  ob.classList.toggle('glow-ok', status === 'ok');
  const st = document.getElementById('output-status');
  st.className = 'output-status';
  const map = {running:['os-running','Running…'], ok:['os-ok','Done'], error:['os-error','Error'], idle:['os-idle','Idle']};
  const [cls, txt] = map[status] || map.idle;
  st.classList.add(cls); st.textContent = txt;
}
const escHtml = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ═══════════════════════════════════════════════════════════
// JS RUNNER
// ═══════════════════════════════════════════════════════════
let outputLines = [];

async function runCode(forSubmit = false, forBonus = false) {
  // Guard: only comments / whitespace = nothing written yet
  const hasRealCode = editor.value.split('\n').some(l => {
    const t = l.trim();
    return t.length > 0 && !t.startsWith('//');
  });
  if (!hasRealCode) {
    setOutput([{type:'error', text:'⚠️  Write some code first before running!'}], 'error');
    return;
  }
  outputLines = [];
  setOutput([{type:'placeholder', text:''}], 'running');
  document.getElementById('btn-run').disabled    = true;
  document.getElementById('btn-submit').disabled = true;
  const bonusBtn = document.getElementById('btn-bonus-submit');
  if (bonusBtn) bonusBtn.disabled = true;

  const origLog  = console.log;
  const origWarn = console.warn;
  const origErr  = console.error;

  console.log   = (...a) => outputLines.push({type:'ok',    text: a.map(x => typeof x === 'object' ? JSON.stringify(x) : String(x)).join(' ')});
  console.warn  = (...a) => outputLines.push({type:'ok',    text: '[warn] ' + a.join(' ')});
  console.error = (...a) => outputLines.push({type:'error', text: a.join(' ')});

  try {
    const AsyncFn = Object.getPrototypeOf(async function(){}).constructor;
    await AsyncFn(editor.value)();
  } catch(err) {
    outputLines.push({type:'error', text: String(err)});
  }

  console.log   = origLog;
  console.warn  = origWarn;
  console.error = origErr;

  if (!outputLines.length) outputLines.push({type:'placeholder', text:'(no output)'});
  const hasErr = outputLines.some(l => l.type === 'error');
  setOutput(outputLines, hasErr ? 'error' : 'ok');
  document.getElementById('btn-run').disabled    = false;
  document.getElementById('btn-submit').disabled = false;
  if (bonusBtn) bonusBtn.disabled = false;

  if (!hasRun) { hasRun = true; unlockSolution(); }
  if (forBonus) { checkBonus(); return; }
  if (forSubmit) checkAnswer();
}

function checkBonus() {
  if (!lesson.bonus || bonusCompleted) return;
  const out  = outputLines.map(l=>l.text).join('\n');
  const code = editor.value;
  const fb   = document.getElementById('bonus-feedback');
  const btn  = document.getElementById('btn-bonus-submit');
  if (lesson.bonus.check(out, code)) {
    bonusCompleted = true;
    fb.textContent = `✅ Bonus complete! +${lesson.bonus.xp} XP`;
    fb.className = 'bonus-feedback success';
    btn.disabled = true; btn.textContent = '✅ Done';
    const state = loadState();
    const bonusKey = `helix_js_bonus_${lessonId}`;
    if (!localStorage.getItem(bonusKey)) {
      localStorage.setItem(bonusKey, '1');
      state.xp += lesson.bonus.xp; state.level = getLevel(state.xp);
      saveState(state);
      document.getElementById('nav-xp').textContent = state.xp;
      const today = new Date().toISOString().slice(0,10);
      const log = JSON.parse(localStorage.getItem('helix_xp_log') || '{}');
      log[today] = (log[today] || 0) + lesson.bonus.xp;
      localStorage.setItem('helix_xp_log', JSON.stringify(log));
    }
  } else {
    fb.textContent = '✗ Not quite — read the bonus description carefully!';
    fb.className = 'bonus-feedback fail';
    setTimeout(() => { fb.className = 'bonus-feedback'; fb.style.display = 'none'; }, 2800);
  }
}

document.getElementById('btn-run').addEventListener('click',    () => runCode(false));
document.getElementById('btn-submit').addEventListener('click', () => runCode(true));

// ═══════════════════════════════════════════════════════════
// CHECK & COMPLETE
// ═══════════════════════════════════════════════════════════
function checkAnswer() {
  const out  = outputLines.map(l => l.text).join('\n');
  const code = editor.value;
  if (lesson.check(out, code)) {
    completeLesson();
  } else {
    const st = document.getElementById('output-status');
    st.className = 'output-status os-error'; st.textContent = 'Not quite — check the hint!';
    setTimeout(() => { st.className = 'output-status os-ok'; st.textContent = 'Done'; }, 2500);
  }
}

function completeLesson() {
  const state        = loadState();
  const langProgress = loadLangProgress();
  const levelBefore  = getLevel(state.xp);
  const earned       = !langProgress.completedIds.includes(lessonId);

  if (earned) {
    // Snapshot trophies BEFORE this lesson counts
    const prevTrophies = evaluateTrophies(
      { ...state },
      { ...langProgress, completedIds: [...langProgress.completedIds] }
    );

    langProgress.completedIds.push(lessonId);
    langProgress.xp = (langProgress.xp || 0) + lesson.xp;
    state.xp += lesson.xp;
    state.lessonsCompleted = (state.completedIds || []).length + langProgress.completedIds.length;
    state.level = getLevel(state.xp);

    // Streak update
    const today     = new Date().toISOString().slice(0, 10);
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    if (!state.streakDate) {
      state.streakDate = today;
      state.streak = Math.max(1, state.streak || 1);
    } else if (state.streakDate === today) {
      // already active today
    } else if (state.streakDate === yesterday) {
      state.streak = (state.streak || 1) + 1;
      state.streakDate = today;
    } else {
      // Gap > 1 day — shield absorbs if available
      if (state.streakShield) {
        state.streakShield = false;
        state.streakDate = today;
        // streak count preserved
      } else {
        state.streak = 1;
        state.streakDate = today;
      }
    }
    // Award shield at every 5-day streak milestone (5, 10, 15…)
    if ((state.streak || 1) % 5 === 0 && !state.streakShield) {
      state.streakShield = true;
    }
    // Track best streak
    if ((state.streak || 1) > (state.bestStreak || 0)) {
      state.bestStreak = state.streak;
    }

    saveState(state);
    saveLangProgress(langProgress);

    // Daily XP log (for weekly chart)
    (function() {
      const today = new Date().toISOString().slice(0, 10);
      const log = JSON.parse(localStorage.getItem('helix_xp_log') || '{}');
      log[today] = (log[today] || 0) + lesson.xp;
      localStorage.setItem('helix_xp_log', JSON.stringify(log));
    })();

    // Level-up badge
    const levelAfter = getLevel(state.xp);
    const lvlEl = document.getElementById('modal-level-up');
    if (levelAfter > levelBefore) {
      document.getElementById('modal-level-num').textContent = `Level ${levelAfter} · ${getLevelTitle(levelAfter)}`;
      lvlEl.style.display = 'flex';
    } else {
      lvlEl.style.display = 'none';
    }

    // Trophy pop-ins
    const nowTrophies = evaluateTrophies(state, langProgress);
    const newTrophies = TOAST_TROPHIES.filter(t => nowTrophies[t.id] && !prevTrophies[t.id]);
    if (newTrophies.length > 0) setTimeout(() => queueTrophyToasts(newTrophies), 1800);

    // Update nav streak + shield
    document.getElementById('nav-streak').textContent = state.streak || 1;
    (function() {
      const badge = document.getElementById('streak-badge');
      if (state.streakShield) {
        badge.classList.add('shielded');
        if (!badge.querySelector('.shield-icon')) {
          const si = document.createElement('span'); si.className = 'shield-icon'; si.textContent = '🛡️';
          badge.appendChild(si);
        }
      } else {
        badge.classList.remove('shielded');
        const si = badge.querySelector('.shield-icon'); if (si) si.remove();
      }
    })();
  } else {
    document.getElementById('modal-level-up').style.display = 'none';
  }

  document.getElementById('progress-fill').style.width = (lessonId / TOTAL * 100) + '%';
  showModal(earned ? lesson.xp : 0);
}

// ═══════════════════════════════════════════════════════════
// MODAL + XP COUNTER ANIMATION
// ═══════════════════════════════════════════════════════════
function showModal(xpEarned) {
  const nextId  = lessonId + 1;
  const hasNext = !!LESSONS[nextId];
  document.getElementById('modal-sub').textContent =
    hasNext ? `Lesson ${lessonId} of ${TOTAL} complete. Keep going!`
            : '🎓 You finished all JavaScript lessons!';
  const btn = document.getElementById('modal-next');
  btn.textContent = hasNext ? 'Next Lesson →' : 'Back to Dashboard';
  btn.onclick = () => window.location.href = hasNext ? `lesson-js.html?id=${nextId}` : 'dashboard.html';

  const el = document.getElementById('modal-xp-count');
  el.textContent = '0';
  let current = 0;
  const step  = Math.ceil(xpEarned / 30);
  const timer = setInterval(() => {
    current = Math.min(current + step, xpEarned);
    el.textContent = current;
    if (current >= xpEarned) clearInterval(timer);
  }, 28);

  document.getElementById('modal').classList.add('show');
  const _s = loadState();
  document.getElementById('nav-xp').textContent = _s.xp;
  document.getElementById('nav-streak').textContent = _s.streak || 1;
  (function() {
    const badge = document.getElementById('streak-badge');
    if (_s.streakShield) {
      badge.classList.add('shielded');
      if (!badge.querySelector('.shield-icon')) {
        const si = document.createElement('span'); si.className = 'shield-icon'; si.textContent = '🛡️';
        badge.appendChild(si);
      }
    } else {
      badge.classList.remove('shielded');
      const si = badge.querySelector('.shield-icon'); if (si) si.remove();
    }
  })();

  if (xpEarned > 0) launchConfetti();
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('show');
});

// ═══════════════════════════════════════════════════════════
// CONFETTI
// ═══════════════════════════════════════════════════════════
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.classList.add('active');

  const COLORS = ['#6366F1','#F59E0B','#10B981','#EF4444','#22D3EE','#818CF8','#FDE68A'];
  const pieces = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height * 0.5,
    w: 6 + Math.random() * 8,
    h: 4 + Math.random() * 6,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    vx: (Math.random() - 0.5) * 3,
    vy: 2 + Math.random() * 4,
    rot: Math.random() * Math.PI * 2,
    vrot: (Math.random() - 0.5) * 0.15,
    opacity: 1,
  }));

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.x   += p.vx;
      p.y   += p.vy;
      p.rot += p.vrot;
      p.vy  += 0.06;
      if (frame > 90) p.opacity = Math.max(0, p.opacity - 0.018);
      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    frame++;
    if (frame < 160) requestAnimationFrame(draw);
    else { canvas.classList.remove('active'); ctx.clearRect(0, 0, canvas.width, canvas.height); }
  }
  requestAnimationFrame(draw);
}

// ═══════════════════════════════════════════════════════════
// LESSON NAV PANEL
// ═══════════════════════════════════════════════════════════
(function() {
  const overlay  = document.getElementById('lnp-overlay');
  const panel    = document.getElementById('lnp-panel');
  const btnOpen  = document.getElementById('btn-lessons');
  const btnClose = document.getElementById('lnp-close');
  const list     = document.getElementById('lnp-list');

  function buildPanel() {
    const langProgress = loadLangProgress();
    const completed    = langProgress.completedIds || [];
    const total        = Object.keys(LESSONS).length;
    const doneCount    = completed.length;

    document.getElementById('lnp-done').textContent = doneCount;
    document.getElementById('lnp-prog-fill').style.width = Math.round((doneCount / total) * 100) + '%';

    list.innerHTML = '';
    Object.keys(LESSONS).forEach(id => {
      const num = parseInt(id);
      const l = LESSONS[num];
      const isDone    = completed.includes(num);
      const isCurrent = num === lessonId;

      const btn = document.createElement('button');
      btn.className = 'lnp-item' + (isDone ? ' completed' : '') + (isCurrent ? ' current' : '');

      const statusEl = document.createElement('div');
      statusEl.className = 'lnp-status';
      statusEl.textContent = isDone ? '✓' : (isCurrent ? '▶' : num);

      const infoEl = document.createElement('div');
      infoEl.className = 'lnp-item-info';

      const titleEl = document.createElement('div');
      titleEl.className = 'lnp-item-title';
      titleEl.textContent = l.title;

      const xpEl = document.createElement('div');
      xpEl.className = 'lnp-item-xp';
      xpEl.textContent = (isDone ? '✓ Earned ' : '') + '+' + l.xp + ' XP';

      infoEl.appendChild(titleEl);
      infoEl.appendChild(xpEl);
      btn.appendChild(statusEl);
      btn.appendChild(infoEl);

      btn.addEventListener('click', () => {
        window.location.href = 'lesson-js.html?id=' + num;
      });

      list.appendChild(btn);
    });

    setTimeout(() => {
      const cur = list.querySelector('.lnp-item.current');
      if (cur) cur.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }, 320);
  }

  function openPanel() {
    buildPanel();
    overlay.classList.add('open');
    panel.classList.add('open');
    btnOpen.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closePanel() {
    overlay.classList.remove('open');
    panel.classList.remove('open');
    btnOpen.classList.remove('active');
    document.body.style.overflow = '';
  }

  btnOpen.addEventListener('click', () => {
    panel.classList.contains('open') ? closePanel() : openPanel();
  });
  btnClose.addEventListener('click', closePanel);
  overlay.addEventListener('click', closePanel);
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePanel(); });
})();
