<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="#050816"/>

  <!-- Subtle glow -->
  <ellipse cx="64" cy="64" rx="48" ry="48" fill="rgba(99,102,241,0.12)"/>

  <!-- DNA double helix centered -->
  <defs>
    <clipPath id="ic"><rect x="14" y="44" width="100" height="40"/></clipPath>
  </defs>
  <g clip-path="url(#ic)">
    <!-- Strand 1: indigo -->
    <path d="M0,64 Q12.5,44 25,64 Q37.5,84 50,64 Q62.5,44 75,64 Q87.5,84 100,64 Q112.5,44 125,64 Q137.5,84 150,64"
          stroke="#6366F1" stroke-width="4" stroke-linecap="round" fill="none"/>
    <!-- Strand 2: cyan -->
    <path d="M0,64 Q12.5,84 25,64 Q37.5,44 50,64 Q62.5,84 75,64 Q87.5,44 100,64 Q112.5,84 125,64 Q137.5,44 150,64"
          stroke="#22D3EE" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.85"/>
    <!-- Rungs -->
    <line x1="25" y1="47" x2="25" y2="81" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
    <line x1="50" y1="47" x2="50" y2="81" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
    <line x1="75" y1="47" x2="75" y2="81" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
    <line x1="100" y1="47" x2="100" y2="81" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  </g>
</svg>
