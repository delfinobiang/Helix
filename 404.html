<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <script src="analytics.js" defer></script>
  <link rel="canonical" href="https://learnhelix.org/404.html" />
  <title>404 — Page Not Found | Helix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #050816;
      --bg-2: #0C1022;
      --bg-card: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.07);
      --border-hi: rgba(99, 102, 241, 0.3);
      --primary: #6366F1;
      --primary-l: #818CF8;
      --cyan: #22D3EE;
      --accent: #F59E0B;
      --text: #EEF2F8;
      --text-2: #8892A4;
      --text-3: #2D3A4E;
      --green: #10B981;
      --red: #EF4444;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Aurora ── */
    .aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px) saturate(130%);
    }

    .orb-1 {
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.5) 0%, transparent 65%);
      top: -100px;
      left: -100px;
      animation: drift-1 22s ease-in-out infinite alternate;
    }

    .orb-2 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.45) 0%, transparent 65%);
      bottom: -100px;
      right: -100px;
      animation: drift-2 17s ease-in-out infinite alternate;
    }

    .orb-3 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(34, 211, 238, 0.3) 0%, transparent 65%);
      top: 30%;
      right: 10%;
      animation: drift-3 14s ease-in-out infinite alternate;
    }

    @keyframes drift-1 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(80px, 60px) scale(1.12); }
    }

    @keyframes drift-2 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(-70px, -50px) scale(1.1); }
    }

    @keyframes drift-3 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(-60px, 50px) scale(1.08); }
    }

    /* ── Main content ── */
    .container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 2rem 1.5rem;
      gap: 1.75rem;
      max-width: 560px;
      width: 100%;
    }

    /* ── Logo ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--text);
      opacity: 0.85;
      transition: opacity 0.2s;
    }

    .logo:hover {
      opacity: 1;
    }

    .logo-wordmark {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    /* ── 404 heading ── */
    .error-code-wrapper {
      position: relative;
      line-height: 1;
    }

    .error-code {
      font-size: clamp(7rem, 18vw, 11rem);
      font-weight: 900;
      letter-spacing: -0.06em;
      background: linear-gradient(135deg, #EEF2F8 0%, #2D3A4E 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      z-index: 1;
      line-height: 1;
    }

    .error-code::after {
      content: "404";
      position: absolute;
      inset: 0;
      font-size: clamp(7rem, 18vw, 11rem);
      font-weight: 900;
      letter-spacing: -0.06em;
      background: linear-gradient(135deg, #EEF2F8 0%, #2D3A4E 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: blur(28px);
      opacity: 0.45;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Code block ── */
    .code-block {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1.25rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      color: var(--text-2);
      width: 100%;
      text-align: left;
      white-space: nowrap;
      overflow-x: auto;
    }

    .token-error {
      color: var(--red);
      font-weight: 600;
    }

    .token-string {
      color: var(--green);
    }

    /* ── Text ── */
    .page-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.025em;
    }

    .page-subtitle {
      font-size: 0.975rem;
      color: var(--text-2);
      line-height: 1.65;
      max-width: 420px;
    }

    /* ── Buttons ── */
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.65rem 1.35rem;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, box-shadow 0.2s, opacity 0.2s, border-color 0.2s, color 0.2s;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      border: 1px solid transparent;
      box-shadow: 0 0 18px rgba(99, 102, 241, 0.35);
    }

    .btn-primary:hover {
      background: var(--primary-l);
      box-shadow: 0 0 28px rgba(99, 102, 241, 0.55);
    }

    .btn-ghost {
      background: var(--bg-card);
      color: var(--text-2);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      border-color: var(--border-hi);
      color: var(--text);
      background: rgba(99, 102, 241, 0.07);
    }

    /* ── Bottom wave decoration ── */
    .wave-deco {
      position: fixed;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      opacity: 0.1;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Aurora background -->
  <div class="aurora" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Main content -->
  <main class="container">

    <!-- Logo -->
    <a href="index.html" class="logo" aria-label="Helix home">
      <svg width="24" height="20" viewBox="0 0 24 20" fill="none" aria-hidden="true" style="overflow:hidden">
        <path d="M-21 4 Q-15 1 -10 4 Q-4 7 1 4 Q6 1 12 4 Q18 7 23 4 Q28 1 34 4 Q40 7 45 4" stroke="#EEF2F8" stroke-width="2" stroke-linecap="round" fill="none"><animateTransform attributeName="transform" type="translate" values="0,0; -22,0" dur="2.5s" repeatCount="indefinite"/></path>
        <line x1="0" y1="10" x2="24" y2="10" stroke="#EEF2F8" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
        <path d="M-21 16 Q-15 19 -10 16 Q-4 13 1 16 Q6 19 12 16 Q18 13 23 16 Q28 19 34 16 Q40 13 45 16" stroke="#EEF2F8" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.25"><animateTransform attributeName="transform" type="translate" values="0,0; -22,0" dur="3s" repeatCount="indefinite"/></path>
      </svg>
      <span class="logo-wordmark">Helix</span>
    </a>

    <!-- 404 -->
    <div class="error-code-wrapper" aria-label="404">
      <div class="error-code" aria-hidden="true">404</div>
    </div>

    <!-- Code block -->
    <div class="code-block" role="img" aria-label="PageNotFoundError: this path doesn't exist">
      <span class="token-error">PageNotFoundError</span><span>: </span><span class="token-string">"this path doesn't exist"</span>
    </div>

    <!-- Title -->
    <h1 class="page-title">Page not found</h1>

    <!-- Subtitle -->
    <p class="page-subtitle">
      Looks like this route threw an exception. The page you're looking for doesn't exist or has moved.
    </p>

    <!-- Buttons -->
    <div class="btn-group">
      <a href="dashboard.html" class="btn btn-primary">&#8592; Back to Dashboard</a>
      <a href="index.html" class="btn btn-ghost">Go Home</a>
    </div>

  </main>

  <!-- Bottom wave decoration -->
  <svg class="wave-deco" width="200" height="80" viewBox="0 0 200 80" fill="none" aria-hidden="true">
    <path d="M0 30 Q25 10 50 30 Q75 50 100 30 Q125 10 150 30 Q175 50 200 30" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <line x1="0" y1="45" x2="200" y2="45" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
    <path d="M0 60 Q25 80 50 60 Q75 40 100 60 Q125 80 150 60 Q175 40 200 60" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.25"/>
  </svg>

</body>
</html>
