<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <script src="analytics.js" defer></script>
  <link rel="canonical" href="https://learnhelix.org/lesson.html" />
  <title>Helix — Lesson</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #050816;
      --bg-2:     #0C1022;
      --bg-card:  rgba(255,255,255,0.04);
      --border:   rgba(255,255,255,0.07);
      --border-hi: rgba(99,102,241,0.3);
      --primary:  #6366F1;
      --primary-l: #818CF8;
      --cyan:     #22D3EE;
      --accent:   #F59E0B;
      --text:     #EEF2F8;
      --text-2:   #8892A4;
      --text-3:   #2D3A4E;
      --green:    #10B981;
      --yellow:   #F59E0B;
      --red:      #EF4444;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; line-height: 1.6;
      overflow: hidden; display: flex; flex-direction: column;
    }
    .aurora {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; overflow: hidden;
      filter: blur(100px) saturate(120%);
    }
    .orb { position: absolute; border-radius: 50%; animation-direction: alternate; animation-iteration-count: infinite; }
    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(99,102,241,0.35) 0%, transparent 65%); top: -100px; left: -100px; animation: drift1 25s ease-in-out infinite alternate; }
    .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(139,92,246,0.25) 0%, transparent 65%); bottom: -100px; right: -100px; animation: drift2 20s ease-in-out infinite alternate; }
    @keyframes drift1 { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(60px,80px) scale(1.1); } }
    @keyframes drift2 { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(-60px,-60px) scale(1.08); } }
    @media (prefers-reduced-motion: reduce) { .orb { animation: none; } }

    /* ─── NAVBAR ──────────────────────────────────────────── */
    nav {
      height: 56px; padding: 0 1.5rem; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(5,8,22,0.85);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }
    .nav-left  { display: flex; align-items: center; gap: 1rem; }
    .nav-right { display: flex; align-items: center; gap: 0.75rem; }
    .btn-back {
      display: flex; align-items: center; gap: 0.4rem;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: var(--text-2); font-size: 0.8rem; font-weight: 600;
      padding: 0.38rem 0.9rem; border-radius: 8px; cursor: pointer;
      font-family: inherit; text-decoration: none;
      transition: background 0.18s, color 0.18s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.07); color: var(--text); }
    .lesson-breadcrumb { font-size: 0.82rem; color: var(--text-3); }
    .lesson-breadcrumb strong { color: var(--text-2); font-weight: 600; }
    .xp-badge {
      display: flex; align-items: center; gap: 0.35rem;
      background: rgba(255,179,71,0.08); border: 1px solid rgba(255,179,71,0.18);
      color: var(--yellow); font-size: 0.78rem; font-weight: 700;
      padding: 0.28rem 0.7rem; border-radius: 100px;
    }
    .btn-primary {
      background: var(--primary);
      border: 1px solid rgba(255,255,255,0.1); color: white;
      font-family: inherit; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; padding: 0.45rem 1.2rem; border-radius: 9px;
      box-shadow: 0 4px 16px rgba(99,102,241,0.28);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(99,102,241,0.38); }
    .btn-primary:disabled { opacity: 0.45; pointer-events: none; }

    /* ─── PROGRESS ────────────────────────────────────────── */
    .lesson-progress { height: 3px; background: rgba(255,255,255,0.05); flex-shrink: 0; }
    .lesson-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transition: width 0.6s ease;
    }

    /* ─── SPLIT ───────────────────────────────────────────── */
    .split {
      flex: 1; display: grid; grid-template-columns: 1fr 1fr;
      overflow: hidden; min-height: 0; position: relative; z-index: 1;
    }

    /* ─── LEFT PANEL ──────────────────────────────────────── */
    .panel-left {
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .panel-left-inner {
      flex: 1; overflow-y: auto; padding: 2rem 2rem 1rem;
    }
    .panel-left-inner::-webkit-scrollbar { width: 4px; }
    .panel-left-inner::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

    .lesson-num-tag {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--primary); margin-bottom: 0.5rem;
    }
    .lesson-title-h {
      font-size: 1.55rem; font-weight: 800; letter-spacing: -0.025em;
      line-height: 1.2; margin-bottom: 1.4rem;
    }
    .lesson-body { font-size: 0.9rem; color: var(--text-2); line-height: 1.82; }
    .lesson-body p  { margin-bottom: 1rem; }
    .lesson-body h3 { font-size: 0.95rem; font-weight: 700; color: var(--text); margin: 1.4rem 0 0.6rem; }
    .lesson-body ul { padding-left: 1.2rem; margin-bottom: 1rem; }
    .lesson-body ul li { margin-bottom: 0.3rem; }
    .lesson-body code {
      font-family: 'JetBrains Mono', monospace; font-size: 0.82em;
      background: rgba(99,102,241,0.1); color: #C4B5FD;
      padding: 0.12em 0.38em; border-radius: 5px;
      border: 1px solid rgba(99,102,241,0.18);
    }
    .lesson-body .code-block {
      background: #05091A; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px; padding: 1rem 1.2rem; margin: 1rem 0;
      font-family: 'JetBrains Mono', monospace; font-size: 0.82rem;
      line-height: 1.9; overflow-x: auto;
    }
    .kw  { color: #C792EA; } .fn  { color: #82AAFF; } .st  { color: #C3E88D; }
    .cm  { color: #3D4F5C; font-style: italic; } .vr  { color: #F78C6C; } .nm  { color: #F78C6C; }

    .challenge-box {
      margin: 1.5rem 0 0;
      background: rgba(99,102,241,0.06); border: 1px solid rgba(99,102,241,0.18);
      border-radius: 14px; padding: 1.2rem 1.3rem;
    }
    .challenge-label {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--primary); margin-bottom: 0.6rem;
    }
    .challenge-text { font-size: 0.9rem; color: var(--text); font-weight: 600; line-height: 1.55; }

    /* Hint / solution */
    .extras { padding: 0 2rem 1.5rem; display: flex; flex-direction: column; gap: 0.6rem; }
    .collapsible { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
    .collapsible-header {
      width: 100%; display: flex; align-items: center; gap: 0.6rem;
      padding: 0.75rem 1rem; background: var(--bg-card);
      border: none; cursor: pointer; font-family: inherit;
      font-size: 0.85rem; font-weight: 600; color: var(--text-2);
      text-align: left; transition: background 0.18s, color 0.18s;
    }
    .collapsible-header:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .collapsible-header .chevron { margin-left: auto; font-size: 0.7rem; transition: transform 0.25s; }
    .collapsible-header.open .chevron { transform: rotate(180deg); }
    .collapsible-hint     { border-color: rgba(255,179,71,0.2); }
    .collapsible-hint .collapsible-header   { color: rgba(255,179,71,0.8); }
    .collapsible-solution { border-color: rgba(74,222,128,0.18); }
    .collapsible-solution .collapsible-header { color: rgba(74,222,128,0.8); }

    /* Locked solution state */
    .collapsible-solution.locked {
      border-color: var(--border);
      opacity: 0.5;
    }
    .collapsible-solution.locked .collapsible-header {
      color: var(--text-3);
      cursor: not-allowed;
    }
    .collapsible-solution.locked .collapsible-header:hover {
      background: var(--bg-card);
      color: var(--text-3);
    }
    .sol-lock-msg {
      font-size: 0.72rem; color: var(--text-3);
      margin-left: auto; margin-right: 0.4rem;
      font-style: italic; white-space: nowrap;
    }
    .collapsible-solution:not(.locked) .sol-lock-msg { display: none; }
    .collapsible-body {
      display: none; padding: 1rem;
      font-size: 0.85rem; line-height: 1.72; color: var(--text-2);
      background: rgba(0,0,0,0.15); border-top: 1px solid var(--border);
    }
    .collapsible-body.open { display: block; }
    .collapsible-body code {
      font-family: 'JetBrains Mono', monospace; font-size: 0.82em;
      background: rgba(99,102,241,0.08); color: #C4B5FD;
      padding: 0.1em 0.35em; border-radius: 5px;
    }
    .collapsible-body .code-block {
      background: #05091A; border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; padding: 0.9rem 1.1rem; margin-top: 0.75rem;
      font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; line-height: 1.9;
      overflow-x: auto;
    }

    /* ─── RIGHT PANEL ─────────────────────────────────────── */
    .panel-right { display: flex; flex-direction: column; overflow: hidden; }
    .editor-toolbar {
      padding: 0.65rem 1.2rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.6rem;
      background: rgba(6,10,20,0.6); flex-shrink: 0;
    }
    .win-dots { display: flex; gap: 5px; }
    .wd { width: 10px; height: 10px; border-radius: 50%; }
    .wd.r { background: #FF5F57; } .wd.y { background: #FFBD2E; } .wd.g { background: #28C840; }
    .editor-fname { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-3); margin-left: 0.4rem; flex: 1; }
    .btn-run {
      display: flex; align-items: center; gap: 0.45rem;
      background: linear-gradient(135deg, #22C55E, #16A34A);
      border: none; color: white; font-family: inherit;
      font-size: 0.82rem; font-weight: 700;
      cursor: pointer; padding: 0.42rem 1.1rem; border-radius: 8px;
      box-shadow: 0 3px 14px rgba(74,222,128,0.22);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-run:hover { transform: translateY(-1px); box-shadow: 0 5px 20px rgba(74,222,128,0.32); }
    .btn-run:disabled { opacity: 0.4; pointer-events: none; }
    .btn-clear {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: var(--text-3); font-family: inherit; font-size: 0.78rem;
      cursor: pointer; padding: 0.42rem 0.85rem; border-radius: 8px;
      transition: background 0.15s, color 0.15s;
    }
    .btn-clear:hover { background: rgba(255,255,255,0.07); color: var(--text-2); }

    .editor-wrap { flex: 1; display: flex; overflow: hidden; position: relative; min-height: 0; }
    .line-nums {
      padding: 1.1rem 0.75rem 1.1rem 1rem;
      font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; line-height: 1.9;
      color: var(--text-3); text-align: right; user-select: none;
      background: rgba(0,0,0,0.15); border-right: 1px solid rgba(255,255,255,0.04);
      min-width: 44px; overflow: hidden; flex-shrink: 0;
    }
    .editor-textarea {
      flex: 1; resize: none; border: none; outline: none;
      background: #050C1A; color: #D4D4F8;
      font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; line-height: 1.9;
      padding: 1.1rem 1.2rem; tab-size: 4;
      caret-color: var(--primary);
      overflow-y: auto; overflow-x: auto;
    }
    .editor-textarea::selection { background: rgba(99,102,241,0.3); }
    .editor-textarea::-webkit-scrollbar { width: 4px; height: 4px; }
    .editor-textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

    /* Output */
    .output-panel {
      border-top: 1px solid var(--border); flex-shrink: 0;
      display: flex; flex-direction: column; max-height: 38%;
    }
    .output-header {
      padding: 0.55rem 1.2rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.5rem;
      background: rgba(0,0,0,0.2); flex-shrink: 0;
    }
    .output-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-3); flex: 1; }
    .output-status { font-size: 0.68rem; font-weight: 700; padding: 0.14rem 0.55rem; border-radius: 6px; }
    .os-running { background: rgba(255,179,71,0.1);  color: var(--yellow); }
    .os-ok      { background: rgba(74,222,128,0.1);  color: var(--green);  }
    .os-error   { background: rgba(255,107,107,0.1); color: var(--red);    }
    .os-idle    { background: rgba(255,255,255,0.04); color: var(--text-3); }
    .output-body {
      flex: 1; overflow-y: auto; padding: 0.9rem 1.2rem;
      font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; line-height: 1.85;
      background: #040810;
    }
    .output-body::-webkit-scrollbar { width: 4px; }
    .output-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 4px; }
    .out-line        { color: var(--green); white-space: pre-wrap; word-break: break-word; display: block; }
    .out-error       { color: var(--red);   white-space: pre-wrap; word-break: break-word; display: block; }
    .out-placeholder { color: var(--text-3); font-style: italic; }

    /* Pyodide loader */
    .py-loader {
      position: absolute; inset: 0; background: rgba(6,10,20,0.88);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.75rem; z-index: 5; backdrop-filter: blur(6px);
    }
    .py-loader.hidden { display: none; }
    .spinner {
      width: 28px; height: 28px; border-radius: 50%;
      border: 3px solid rgba(99,102,241,0.2); border-top-color: var(--primary);
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .py-loader-text { font-size: 0.82rem; color: var(--text-3); }

    /* ─── COMPLETION MODAL ────────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px); z-index: 200;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.28s;
    }
    .modal-backdrop.show { opacity: 1; pointer-events: all; }
    .modal {
      background: #05091A; border: 1px solid rgba(99,102,241,0.28);
      border-radius: 26px; padding: 2.5rem 2.5rem 2rem;
      max-width: 420px; width: 90%; text-align: center;
      transform: translateY(24px) scale(0.95);
      transition: transform 0.32s cubic-bezier(0.34,1.55,0.64,1);
      box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 60px rgba(99,102,241,0.10);
      position: relative; overflow: hidden;
    }
    .modal-backdrop.show .modal { transform: translateY(0) scale(1); }

    /* Pip in modal */
    .modal-pip-wrap { margin-bottom: 1rem; animation: pip-bounce 0.7s ease; }
    @keyframes pip-bounce {
      0%   { transform: translateY(-30px) scale(0.7); opacity: 0; }
      60%  { transform: translateY(5px) scale(1.05); opacity: 1; }
      100% { transform: translateY(0) scale(1); }
    }
    .modal-title { font-size: 1.45rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.4rem; }
    .modal-sub   { font-size: 0.88rem; color: var(--text-2); margin-bottom: 1.5rem; line-height: 1.6; }
    .modal-xp-wrap {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: rgba(255,179,71,0.1); border: 1px solid rgba(255,179,71,0.22);
      color: var(--yellow); font-size: 1.15rem; font-weight: 800;
      padding: 0.55rem 1.6rem; border-radius: 100px; margin-bottom: 1.6rem;
    }
    .modal-xp-count { transition: all 0.1s; }
    .modal-actions { display: flex; gap: 0.75rem; justify-content: center; }
    .btn-modal-next {
      background: var(--primary);
      border: 1px solid rgba(255,255,255,0.1); color: white;
      font-family: inherit; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; padding: 0.7rem 1.8rem; border-radius: 12px;
      box-shadow: 0 4px 20px rgba(99,102,241,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-modal-next:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(99,102,241,0.4); }
    .btn-modal-dash {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: var(--text-2); font-family: inherit; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; padding: 0.7rem 1.4rem; border-radius: 12px;
      transition: background 0.15s, color 0.15s;
    }
    .btn-modal-dash:hover { background: rgba(255,255,255,0.07); color: var(--text); }

    /* ─── CONFETTI CANVAS ─────────────────────────────────── */
    #confetti-canvas {
      position: fixed; inset: 0; pointer-events: none; z-index: 199;
      opacity: 0; transition: opacity 0.3s;
    }
    #confetti-canvas.active { opacity: 1; }

    /* ─── TROPHY TOAST ───────────────────────────────────── */
    .trophy-toast {
      display: flex; align-items: center; gap: 0.85rem;
      padding: 0.75rem 1rem 0.75rem 0.75rem;
      background: rgba(5,8,22,0.97);
      backdrop-filter: blur(28px) saturate(160%);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 24px 64px rgba(0,0,0,0.72), inset 0 0 0 1px rgba(255,255,255,0.03);
      min-width: 230px; max-width: 290px;
      transform: translateX(calc(100% + 2rem));
      opacity: 0;
      transition: transform 0.44s cubic-bezier(0.34,1.56,0.64,1), opacity 0.32s ease;
      will-change: transform, opacity;
    }
    .trophy-toast.show { transform: translateX(0); opacity: 1; }
    .trophy-toast.hide {
      transform: translateX(calc(100% + 2rem)); opacity: 0;
      transition: transform 0.28s ease-in, opacity 0.22s ease;
    }
    .tt-icon {
      width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.15rem;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    }
    .tt-body { flex: 1; min-width: 0; }
    .tt-label {
      font-size: 0.57rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.14em; margin-bottom: 2px; color: rgba(255,255,255,0.45);
    }
    .tt-name {
      font-size: 0.84rem; font-weight: 700; color: #EEF2F8;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tt-tier {
      font-size: 0.57rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; padding: 2px 7px; border-radius: 5px; flex-shrink: 0;
    }
    .tt-tier.bronze  { background: rgba(205,127,50,0.15); color: #CD7F32; border: 1px solid rgba(205,127,50,0.25); }
    .tt-tier.silver  { background: rgba(148,163,184,0.12); color: #94A3B8; border: 1px solid rgba(148,163,184,0.2); }
    .tt-tier.gold    { background: rgba(234,179,8,0.12); color: #EAB308; border: 1px solid rgba(234,179,8,0.22); }
    .tt-tier.platinum {
      background: linear-gradient(135deg, rgba(129,140,248,0.14), rgba(56,189,248,0.14));
      color: #818CF8; border: 1px solid rgba(129,140,248,0.28);
    }

    /* ─── LESSON NAV PANEL ───────────────────────────────── */
    .btn-lessons {
      display: flex; align-items: center; gap: 0.4rem;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: var(--text-2); font-size: 0.8rem; font-weight: 600;
      padding: 0.38rem 0.9rem; border-radius: 8px; cursor: pointer;
      font-family: inherit; transition: background 0.18s, color 0.18s, border-color 0.18s;
    }
    .btn-lessons:hover { background: rgba(255,255,255,0.07); color: var(--text); }
    .btn-lessons.active { background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.35); color: var(--primary-l); }

    .lesson-nav-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,0); pointer-events: none;
      transition: background 0.25s ease;
    }
    .lesson-nav-overlay.open { background: rgba(0,0,0,0.5); pointer-events: auto; }

    .lesson-nav-panel {
      position: fixed; top: 0; right: 0; bottom: 0; z-index: 51;
      width: 300px; max-width: 85vw;
      background: #0C1022;
      border-left: 1px solid rgba(99,102,241,0.2);
      box-shadow: -8px 0 48px rgba(0,0,0,0.45);
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    }
    .lesson-nav-panel.open { transform: translateX(0); }

    .lnp-header {
      padding: 1rem 1.25rem 0.9rem;

      flex: 1; overflow-y: auto; padding: 0.5rem 0;
    }

      display: flex; align-items: center; gap: 0.75rem;

      border: none; background: none; width: 100%; text-align: left;

    .lnp-item:hover { background: rgba(255,255,255,0.04); }
    .lnp-item.current {
      background: rgba(99,102,241,0.08);
      border-left-color: var(--primary);
    }
    .lnp-item.completed { }
    .lnp-item.locked { opacity: 0.45; cursor: default; }
    .lnp-item.locked:hover { background: none; }

    .lnp-status {
      width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 800;
    }
    .lnp-item.completed  .lnp-status { background: rgba(16,185,129,0.15); border: 1.5px solid var(--green); color: var(--green); }
    .lnp-item.current    .lnp-status { background: rgba(99,102,241,0.2); border: 1.5px solid var(--primary); color: var(--primary-l); }
    .lnp-item.locked     .lnp-status { background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.1); color: var(--text-3); }

    .lnp-item-info { flex: 1; min-width: 0; }

  1: {

    content: `
      <div class="lesson-num-tag">Lesson 1 · Python Fundamentals</div>
      <h1 class="lesson-title-h">Hello, World! 🐍</h1>
      <div class="lesson-body">
        <p>Every programmer's journey starts here. In Python, <code>print()</code> displays text on the screen.</p>
        <div class="code-block"><span class="kw">print</span>(<span class="st">"Hello, World!"</span>)  <span class="cm"># Hello, World!</span></div>
        <p>The text inside quotes is called a <strong>string</strong>. You can use single <code>'</code> or double <code>"</code> quotes.</p>
        <h3>Multiple prints</h3>
        <div class="code-block"><span class="kw">print</span>(<span class="st">"Line 1"</span>)
<span class="kw">print</span>(<span class="st">"Line 2"</span>)</div>
        <div class="challenge-box">
          <div class="challenge-label">🎯 Challenge</div>
          <div class="challenge-text">Print exactly two lines:<br><code>Hello, World!</code><br><code>I am learning Python!</code></div>
        </div>
      </div>`,
    hint: `<p>Call <code>print()</code> twice — once per line:</p>
      <div class="code-block"><span class="kw">print</span>(<span class="st">"first line"</span>)
<span class="kw">print</span>(<span class="st">"second line"</span>)</div>`,
    solution: `<div class="code-block"><span class="kw">print</span>(<span class="st">"Hello, World!"</span>)
<span class="kw">print</span>(<span class="st">"I am learning Python!"</span>)</div>`,

  2: {
    title: "Variables", xp: 75, fname: "variables.py",
    content: `
      <div class="lesson-num-tag">Lesson 2 · Python Fundamentals</div>
      <h1 class="lesson-title-h">Variables 📦</h1>
      <div class="lesson-body">
        <p>A <strong>variable</strong> is a labelled box that stores a value. Use <code>=</code> to assign:</p>
        <div class="code-block"><span class="vr">name</span>  = <span class="st">"Alice"</span>
<span class="vr">age</span>   = <span class="nm">21</span>
<span class="kw">print</span>(<span class="vr">name</span>)   <span class="cm"># Alice</span>
<span class="kw">print</span>(<span class="vr">age</span>)    <span class="cm"># 21</span></div>
        <h3>Naming rules</h3>
        <ul>
          <li>Lowercase + underscores: <code>user_name</code></li>
          <li>No spaces or special characters</li>
          <li>Must start with a letter</li>
        </ul>
        <div class="challenge-box">
          <div class="challenge-label">🎯 Challenge</div>
          <div class="challenge-text">Create a variable <code>name</code> with your name, and <code>level</code> = <code>1</code>. Print both on separate lines.</div>
        </div>
      </div>`,
    hint: `<div class="code-block"><span class="vr">name</span>  = <span class="st">"Your Name"</span>
<span class="vr">level</span> = <span class="nm">1</span>
<span class="kw">print</span>(<span class="vr">name</span>)
<span class="kw">print</span>(<span class="vr">level</span>)</div>`,
    solution: `<div class="code-block"><span class="vr">name</span>  = <span class="st">"Alex"</span>
<span class="vr">level</span> = <span class="nm">1</span>
<span class="kw">print</span>(<span class="vr">name</span>)
<span class="kw">print</span>(<span class="vr">level</span>)</div>`,

  4: {

<span class="kw">if</span> <span class="vr">temperature</span> > <span class="nm">30</span>:
    <span class="kw">print</span>(<span class="st">"..."</span>)
<span class="kw">else</span>:

function loadState() {

function getLevel(xp) {
  const t = [0, 100, 250, 500, 900, 1400, 2000, 3000];
  for (let i = t.length - 1; i >= 0; i--) if (xp >= t[i]) return i + 1;
  return 1;
}

  const titles = ['', 'Novice', 'Coder', 'Builder', 'Engineer', 'Architect', 'Master', 'Legend'];

}

let _toastQueue = [];

function _showNextToast() {
  if (_toastQueue.length === 0) { _toastActive = false; return; }

  const TIER_LABEL = { bronze:'Bronze', silver:'Silver', gold:'Gold', platinum:'Platinum' };

function setOutput(lines, status) {

  ob.innerHTML = lines.map(l => {

    if (l.type === 'error')       return `<span class="out-error">${escHtml(l.text)}</span>`;
    return `<span class="out-line">${escHtml(l.text)}</span>`;
  }).join('');
  const st = document.getElementById('output-status');
  st.className = 'output-status';
  const map = {running:['os-running','Running…'], ok:['os-ok','Done'], error:['os-error','Error'], idle:['os-idle','Idle']};
  const [cls, txt] = map[status] || map.idle;
  st.classList.add(cls); st.textContent = txt;
}
const escHtml = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

async function runCode(forSubmit = false) {

import builtins
_mock = ${JSON.stringify(mock)}

    import sys; sys.stdout.write(prompt + _mock + '\\n'); return _mock
builtins.input = _pi

function completeLesson() {
  const state       = loadState();
  const levelBefore = getLevel(state.xp);
  const earned      = !state.completedIds.includes(lessonId);

  if (earned) {
    // Snapshot trophies BEFORE this lesson counts
    const prevTrophies = evaluateTrophies({ ...state, completedIds: [...state.completedIds] });

    // ── Core progress update ────────────────────────────
    state.completedIds.push(lessonId);
    state.xp             += lesson.xp;
    state.lessonsCompleted = state.completedIds.length;
    state.level            = getLevel(state.xp);

    // ── Streak update ───────────────────────────────────
    const today     = new Date().toISOString().slice(0, 10);
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    if (!state.streakDate) {
      state.streakDate = today;
      state.streak = Math.max(1, state.streak || 1);
    } else if (state.streakDate === today) {
      // Already active today — streak unchanged
    } else if (state.streakDate === yesterday) {
      state.streak = (state.streak || 1) + 1;
      state.streakDate = today;
    } else {
      // Gap > 1 day — streak broken
      state.streak = 1;
      state.streakDate = today;
    }

    saveState(state);

    // ── Daily XP log (for weekly chart) ────────────────
    (function() {
      const today = new Date().toISOString().slice(0, 10);
      const log = JSON.parse(localStorage.getItem('helix_xp_log') || '{}');
      log[today] = (log[today] || 0) + lesson.xp;
      localStorage.setItem('helix_xp_log', JSON.stringify(log));
    })();

    // ── Level-up badge ──────────────────────────────────
    const levelAfter = getLevel(state.xp);
    const lvlEl = document.getElementById('modal-level-up');
    if (levelAfter > levelBefore) {
      document.getElementById('modal-level-num').textContent = `Level ${levelAfter} · ${getLevelTitle(levelAfter)}`;
      lvlEl.style.display = 'flex';
    } else {
      lvlEl.style.display = 'none';
    }

    // ── Trophy pop-ins ──────────────────────────────────
    const nowTrophies  = evaluateTrophies(state);
    const newTrophies  = TOAST_TROPHIES.filter(t => nowTrophies[t.id] && !prevTrophies[t.id]);
    if (newTrophies.length > 0) {
      setTimeout(() => queueTrophyToasts(newTrophies), 1800);
    }

  } else {
    document.getElementById('modal-level-up').style.display = 'none';
  }

  document.getElementById('progress-fill').style.width = (lessonId / TOTAL * 100) + '%';
  showModal(earned ? lesson.xp : 0);
}

// CONFETTI
// ═══════════════════════════════════════════════════════════
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.classList.add('active');

  const COLORS = ['#6366F1','#F59E0B','#10B981','#EF4444','#22D3EE','#818CF8','#FDE68A'];
  const pieces = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height * 0.5,
    w: 6 + Math.random() * 8,
    h: 4 + Math.random() * 6,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    vx: (Math.random() - 0.5) * 3,
    vy: 2 + Math.random() * 4,
    rot: Math.random() * Math.PI * 2,
    vrot: (Math.random() - 0.5) * 0.15,
    opacity: 1,
  }));

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.x   += p.vx;
      p.y   += p.vy;
      p.rot += p.vrot;
      p.vy  += 0.06; // gravity
      if (frame > 90) p.opacity = Math.max(0, p.opacity - 0.018);
      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    frame++;
    if (frame < 160) requestAnimationFrame(draw);
    else { canvas.classList.remove('active'); ctx.clearRect(0, 0, canvas.width, canvas.height); }
  }
  requestAnimationFrame(draw);
}

      statusEl.className = 'lnp-status';
      statusEl.textContent = isDone ? '✓' : (isCurrent ? '▶' : num);

      const infoEl = document.createElement('div');
      infoEl.className = 'lnp-item-info';

      const titleEl = document.createElement('div');
      titleEl.className = 'lnp-item-title';
      titleEl.textContent = l.title;

      const xpEl = document.createElement('div');
      xpEl.className = 'lnp-item-xp';
      xpEl.textContent = (isDone ? '✓ Earned' : '') + ' +' + l.xp + ' XP';

      infoEl.appendChild(titleEl);
      infoEl.appendChild(xpEl);
      btn.appendChild(statusEl);
      btn.appendChild(infoEl);

      btn.addEventListener('click', () => {
        window.location.href = 'lesson.html?id=' + num;
      });

      list.appendChild(btn);
    });

    // Scroll current lesson into view
    setTimeout(() => {
      const cur = list.querySelector('.lnp-item.current');
      if (cur) cur.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }, 320);
  }

  function openPanel() {
    buildPanel();
    overlay.classList.add('open');
    panel.classList.add('open');
    btnOpen.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closePanel() {
    overlay.classList.remove('open');
    panel.classList.remove('open');
    btnOpen.classList.remove('active');
    document.body.style.overflow = '';
  }

  btnOpen.addEventListener('click', () => {
    panel.classList.contains('open') ? closePanel() : openPanel();
  });
  btnClose.addEventListener('click', closePanel);
  overlay.addEventListener('click', closePanel);
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePanel(); });
})();
</script>
</body>
</html>
